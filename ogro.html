<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FRANK FORD | NINGEN</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
    font-family:Segoe UI, sans-serif;
    background:black;
    color:white;
    overflow:hidden;
}

.fondoPersonaje{
    position:fixed;
    inset:0;
    width:100vw;
    height:100vh;
    object-fit:cover;
    object-position:52% 42%;
    opacity:.9;
    z-index:-2;
    filter:brightness(.70) contrast(1.18);
}

.capaOscura{
    position:fixed;
    inset:0;
    background:
        radial-gradient(circle at center, rgba(0,0,0,.05), rgba(0,0,0,.78) 80%),
        rgba(0,0,0,.20);
    z-index:-1;
}

.sonido{
    position:fixed;
    right:30px;
    top:30px;
    width:58px;
    height:58px;
    border-radius:50%;
    border:2px solid white;
    background:rgba(0,0,0,.55);
    color:white;
    font-size:28px;
    cursor:pointer;
    z-index:40;
    box-shadow:0 0 12px white;
}

.titulo{
    position:fixed;
    top:35px;
    left:50%;
    transform:translateX(-50%);
    font-size:55px;
    letter-spacing:10px;
    text-shadow:0 0 12px #9cff8f,0 0 35px #145c12;
    z-index:5;
}

.subtitulo{
    position:fixed;
    top:110px;
    left:50%;
    transform:translateX(-50%);
    font-size:16px;
    letter-spacing:4px;
    color:#d8ffd1;
    text-align:center;
    z-index:5;
}

.selectorVisual{
    position:fixed;
    top:145px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:12px;
    z-index:30;
}

.selectorVisual button{
    padding:10px 22px;
    border-radius:14px;
    border:1px solid rgba(255,255,255,.42);
    background:rgba(0,0,0,.45);
    color:#d8ffd1;
    font-weight:bold;
    letter-spacing:2px;
    cursor:pointer;
    box-shadow:0 0 10px rgba(156,255,143,.25);
}

.selectorVisual button:hover{
    box-shadow:0 0 18px rgba(156,255,143,.65);
}

.menuLateral{
    position:fixed;
    left:25px;
    top:50%;
    transform:translateY(-50%);
    display:flex;
    flex-direction:column;
    gap:12px;
    z-index:30;
}

.botonNingen{
    width:240px;
    padding:18px;
    border-radius:18px;
    border:1px solid rgba(255,255,255,.65);
    color:white;
    font-size:24px;
    font-weight:bold;
    letter-spacing:4px;
    cursor:pointer;
    background:linear-gradient(90deg,#c00000,#5c0000);
    box-shadow:0 0 8px rgba(255,255,255,.25),0 0 18px rgba(255,0,0,.35);
    transition:.3s;
}

.botonFicha{
    width:240px;
    padding:15px;
    border-radius:16px;
    border:1px solid rgba(255,255,255,.42);
    color:white;
    font-size:15px;
    font-weight:bold;
    letter-spacing:2px;
    cursor:pointer;
    background:linear-gradient(135deg,#061f08,#23721f,#020b03);
    box-shadow:0 0 8px rgba(255,255,255,.12),0 0 12px rgba(156,255,143,.28);
    transition:.3s;
}

.botonNingen:hover{transform:scale(1.04)}

.botonFicha:hover{
    transform:translateX(6px);
    box-shadow:0 0 12px rgba(255,255,255,.25),0 0 18px rgba(156,255,143,.55);
}

.panelInfo{
    position:fixed;
    left:330px;
    top:210px;
    width:470px;
    min-height:330px;
    max-height:62vh;
    overflow-y:auto;
    padding:28px;
    border-radius:20px;
    border:1px solid rgba(255,255,255,.22);
    background:rgba(0,0,0,.50);
    backdrop-filter:blur(5px);
    z-index:20;
}

.panelInfo h2{
    font-size:25px;
    letter-spacing:4px;
    color:#d8ffd1;
    margin-bottom:18px;
}

.panelInfo p{
    font-size:16px;
    line-height:1.65;
    color:rgba(255,255,255,.84);
}

.zonaCentral{
    position:fixed;
    top:185px;
    right:110px;
    width:520px;
    bottom:60px;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:8;
}

.splashPersonaje{
    max-width:100%;
    max-height:100%;
    object-fit:contain;
    filter:drop-shadow(0 0 24px rgba(156,255,143,.45));
}

@media (max-width:768px){
    .fondoPersonaje{
        object-position:center center;
        opacity:.75;
        filter:brightness(.62) contrast(1.15);
    }

    .titulo{
        top:22px;
        font-size:27px;
        letter-spacing:4px;
        width:90%;
        text-align:center;
    }

    .subtitulo{
        top:68px;
        font-size:10px;
        width:90%;
        letter-spacing:2px;
    }

    .selectorVisual{
        top:88px;
        gap:5px;
        width:90%;
        justify-content:center;
    }

    .selectorVisual button{
        padding:5px 8px;
        font-size:8px;
        border-radius:8px;
        letter-spacing:1px;
    }

    .sonido{
        width:42px;
        height:42px;
        right:13px;
        top:13px;
        font-size:20px;
    }

    .zonaCentral{
        top:105px;
        left:5px;
        right:5px;
        width:auto;
        bottom:165px;
        align-items:center;
    }

    .splashPersonaje{
        max-width:96%;
        max-height:100%;
    }

    .menuLateral{
        left:8px;
        top:auto;
        bottom:8px;
        transform:none;
        width:46%;
        gap:4px;
    }

    .botonNingen{
        width:100%;
        padding:8px;
        font-size:14px;
        border-radius:10px;
        letter-spacing:3px;
    }

    .botonFicha{
        width:100%;
        padding:6px;
        font-size:8.5px;
        border-radius:9px;
        letter-spacing:1px;
        background:transparent;
        border:1px solid rgba(255,255,255,.32);
        box-shadow:none;
    }

    .panelInfo{
        left:auto;
        top:auto;
        right:8px;
        bottom:8px;
        width:46%;
        min-height:160px;
        max-height:260px;
        overflow-y:auto;
        padding:11px;
        border-radius:12px;
        background:rgba(0,0,0,.38);
    }

    .panelInfo h2{
        font-size:11px;
        letter-spacing:1px;
        margin-bottom:7px;
    }

    .panelInfo p{
        font-size:9px;
        line-height:1.35;
    }
}
</style>
</head>

<body>

<img class="fondoPersonaje" src="Logo El Ogro.png" alt="Fondo Frank Ford El Ogro">

<audio id="audioFondo" loop>
    <source src="Soundtrack Ogro.mp3" type="audio/mpeg">
</audio>

<div class="capaOscura"></div>

<button class="sonido" id="botonSonido" onclick="toggleSonido()">🔇</button>

<div class="titulo">FRANK FORD</div>
<div class="subtitulo">Archivo NINGEN // El Ogro de la Fisura</div>

<div class="selectorVisual">
    <button onclick="mostrarVisual('splash')">SPLASH ART</button>
    <button onclick="mostrarVisual('carta')">CARTA</button>
    <button onclick="mostrarVisual('boceto')">BOCETO</button>
</div>

<div class="panelInfo">
    <h2 id="tituloInfo">ARCHIVO</h2>
    <p id="textoInfo">Selecciona una categoría para desplegar información de Frank Ford.</p>
</div>

<div class="zonaCentral">
    <img id="imagenPrincipal" class="splashPersonaje" src="Splash Art El Ogro.png" alt="Frank Ford El Ogro">
</div>

<div class="menuLateral">
    <button class="botonNingen" onclick="window.location.href='index.html'">NINGEN</button>

    <button class="botonFicha" onclick="mostrarInfo('IDENTIDAD')">IDENTIDAD</button>
    <button class="botonFicha" onclick="mostrarInfo('ORIGEN')">ORIGEN</button>
    <button class="botonFicha" onclick="mostrarInfo('DESCRIPCIÓN')">DESCRIPCIÓN</button>
    <button class="botonFicha" onclick="mostrarInfo('PERSONALIDAD')">PERSONALIDAD</button>
    <button class="botonFicha" onclick="mostrarInfo('HISTORIA')">HISTORIA</button>
    <button class="botonFicha" onclick="mostrarInfo('HABILIDADES')">HABILIDADES</button>
    <button class="botonFicha" onclick="mostrarInfo('FRAGMENTOS')">FRAGMENTOS</button>
    <button class="botonFicha" onclick="mostrarInfo('RELACIONES')">RELACIONES</button>
    <button class="botonFicha" onclick="mostrarInfo('REGISTROS')">REGISTROS</button>
    <button class="botonFicha" onclick="mostrarInfo('CLASIFICACIÓN')">CLASIFICACIÓN</button>
</div>

<script>
function toggleSonido(){
    const audio=document.getElementById("audioFondo");
    const boton=document.getElementById("botonSonido");

    if(audio.paused){
        audio.volume=.55;
        audio.play();
        boton.textContent="🔊";
    }else{
        audio.pause();
        boton.textContent="🔇";
    }
}

function mostrarVisual(tipo){
    const img=document.getElementById("imagenPrincipal");

    if(tipo==="splash"){
        img.src="Splash Art El Ogro.png";
        img.alt="Frank Ford El Ogro";
    }

    if(tipo==="carta"){
        img.src="Carta El Ogro.png";
        img.alt="Carta Frank Ford";
    }

    if(tipo==="boceto"){
        img.src="Boceto El Ogro.png";
        img.alt="Boceto Frank Ford";
    }
}

function mostrarInfo(seccion){
    const titulo=document.getElementById("tituloInfo");
    const texto=document.getElementById("textoInfo");

    const info={
        "IDENTIDAD":`
            <strong>Nombre:</strong> Frank Ford<br>
            <strong>Alias:</strong> El Ogro, El Científico Corrupto, El Primer Experimento Viviente.<br>
            <strong>Raza:</strong> Humano Alterado<br>
            <strong>Sexo:</strong> Masculino<br>
            <strong>Edad aparente:</strong> 58 años<br>
            <strong>Estado:</strong> Activo<br>
            <strong>Primera aparición conocida:</strong> Chile, 2010<br>
            <strong>Ubicación actual:</strong> Desconocida.
        `,

        "ORIGEN":`
            Años después de que Isaac Salvatore separara fragmentos de forma controlada, Frank Ford intentó ir más lejos.<br><br>
            No quería dividirlos. Quería combinarlos.<br><br>
            Su teoría era simple y peligrosa: si dos fragmentos podían coexistir en un mismo proceso, tal vez podrían generar una nueva compatibilidad.<br><br>
            Durante el terremoto de Chile de 2010, el laboratorio donde realizaba sus pruebas colapsó parcialmente.<br><br>
            Las fisuras abiertas en la tierra dejaron expuestos fragmentos de Fisura. Frank y su sujeto de prueba quedaron inconscientes, en contacto con restos de fragmentos combinados y con aquello que emergió desde las grietas.<br><br>
            El resultado no fue una creación nueva. Fue una malformación irreversible.
        `,

        "DESCRIPCIÓN":`
            Frank Ford conserva una silueta humanoide, pero su cuerpo ya no responde a proporciones humanas.<br><br>
            Su masa muscular, piel y estructura ósea parecen haber sido forzadas a crecer de manera irregular.<br><br>
            Su presencia transmite brutalidad, peso y deformación.<br><br>
            Lo más inquietante no es su apariencia monstruosa, sino que detrás de ella sigue existiendo una mente científica.
        `,

        "PERSONALIDAD":`
            Frank Ford era brillante, metódico y peligrosamente obsesivo.<br><br>
            Su deseo de comprender los fragmentos terminó anulando cualquier límite moral.<br><br>
            Tomó a un niño abandonado de la calle y lo convirtió en sujeto de prueba. Para Frank, ya no era un niño: era una variable, una posibilidad, una respuesta esperando aparecer.<br><br>
            No buscaba fama ni riqueza. Buscaba conocimiento.<br><br>
            Y estaba dispuesto a pasar por encima de la libertad, el futuro o la vida de otro ser humano para obtenerlo.
        `,

        "HISTORIA":`
            Frank estudió durante años los registros sobre fragmentos divididos.<br><br>
            Creía que la separación era solo el primer paso y que el verdadero avance estaba en la combinación.<br><br>
            Para probarlo, utilizó fragmentos asociados al Alcance y a la Vida en un experimento de compatibilidad.<br><br>
            El terremoto interrumpió el proceso y abrió fisuras bajo el laboratorio.<br><br>
            Cuando Frank despertó, su cuerpo había cambiado. La transformación no inventó un monstruo: amplificó lo que ya vivía dentro de él.<br><br>
            Desde ese día dejó de ser registrado como científico y comenzó a ser registrado como El Ogro.
        `,

        "HABILIDADES":`
            <strong>Fuerza Descomunal:</strong> puede destruir estructuras mediante fuerza física directa.<br><br>
            <strong>Resistencia Extrema:</strong> soporta daños que resultarían letales para un humano común.<br><br>
            <strong>Adaptación Mutagénica:</strong> su cuerpo continúa alterándose para sobrevivir.<br><br>
            <strong>Intelecto Conservado:</strong> mantiene conocimientos científicos avanzados pese a su deformación.<br><br>
            <strong>Percepción Fragmentaria:</strong> detecta rastros de fragmentos cercanos o inestables.
        `,

        "FRAGMENTOS":`
            <strong>Fragmentos involucrados:</strong> Alcance, Vida y Fisura.<br><br>
            Frank intentó combinar fragmentos previamente separados, especialmente propiedades vinculadas al Alcance y la Vida.<br><br>
            El contacto accidental con fragmentos de Fisura durante el terremoto alteró el proceso por completo.<br><br>
            La Fisura no creó algo nuevo. Expuso y deformó lo que ya existía dentro de los cuerpos presentes.<br><br>
            En Frank, aquello tomó la forma de un ogro.
        `,

        "RELACIONES":`
            <strong>Ben:</strong> niño abandonado utilizado como sujeto de prueba. Sobrevivió al mismo incidente que transformó a Frank.<br><br>
            <strong>Isaac Salvatore:</strong> sus antiguos estudios sobre división de fragmentos inspiraron indirectamente la investigación de Frank.<br><br>
            Frank no vio personas en su laboratorio. Vio materiales, cuerpos y posibilidades.
        `,

        "REGISTROS":`
            <strong>Registro 087:</strong> Teoría de Combinación Fragmentaria. Primer documento atribuido a Frank Ford.<br><br>
            <strong>Registro 088:</strong> Incidente de 2010. Archivo incompleto recuperado tras el terremoto.<br><br>
            <strong>Registro 089:</strong> Nacimiento del Ogro. Primer avistamiento posterior a la transformación.<br><br>
            <strong>Registro 090:</strong> Lo que Había Dentro. Investigación sobre la relación entre Fisura y naturaleza interna.
        `,

        "CLASIFICACIÓN":`
            <strong>Tipo:</strong> Humano Alterado<br>
            <strong>Nivel de amenaza:</strong> ⭐⭐⭐⭐⭐⭐⭐⭐⭐<br>
            <strong>Importancia histórica:</strong> 10/10<br>
            <strong>Nivel de conocimiento:</strong> Prohibido<br>
            <strong>Estado:</strong> Activo<br>
            <strong>Riesgo para la humanidad:</strong> Extremo<br>
            <strong>Clasificación Ningen:</strong> Anomalía de Fisura
        `
    };

    titulo.textContent=seccion;
    texto.innerHTML=info[seccion];
}
</script>

</body>
</html>
