<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ENOC | NINGEN</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
    font-family:Segoe UI, sans-serif;
    background:black;
    color:white;
    overflow:hidden;
}

.fondoPersonaje{
    position:fixed;
    inset:0;
    width:100vw;
    height:100vh;
    object-fit:cover;
    object-position:center center;
    opacity:.97;
    z-index:-2;
    filter:brightness(.84) contrast(1.16) saturate(.96);
}

.capaOscura{
    position:fixed;
    inset:0;
    background:
        radial-gradient(circle at center, rgba(0,0,0,.03), rgba(0,0,0,.66) 82%),
        rgba(0,0,0,.15);
    z-index:-1;
}

.sonido{
    position:fixed;
    right:30px;
    top:30px;
    width:58px;
    height:58px;
    border-radius:50%;
    border:2px solid white;
    background:rgba(0,0,0,.55);
    color:white;
    font-size:28px;
    cursor:pointer;
    z-index:40;
    box-shadow:0 0 12px white;
}

.titulo{
    position:fixed;
    top:35px;
    left:50%;
    transform:translateX(-50%);
    font-size:55px;
    letter-spacing:10px;
    text-shadow:0 0 12px #fff3b0,0 0 35px #8a6f00;
    z-index:5;
}

.subtitulo{
    position:fixed;
    top:110px;
    left:50%;
    transform:translateX(-50%);
    font-size:16px;
    letter-spacing:4px;
    color:#fff5c7;
    text-align:center;
    z-index:5;
}

.selectorVisual{
    position:fixed;
    top:145px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:12px;
    z-index:30;
}

.selectorVisual button{
    padding:10px 22px;
    border-radius:14px;
    border:1px solid rgba(255,255,255,.42);
    background:rgba(0,0,0,.45);
    color:#fff5c7;
    font-weight:bold;
    letter-spacing:2px;
    cursor:pointer;
    box-shadow:0 0 10px rgba(255,243,176,.25);
}

.selectorVisual button:hover{
    box-shadow:0 0 18px rgba(255,243,176,.65);
}

.menuLateral{
    position:fixed;
    left:25px;
    top:50%;
    transform:translateY(-50%);
    display:flex;
    flex-direction:column;
    gap:12px;
    z-index:30;
}

.botonNingen{
    width:240px;
    padding:18px;
    border-radius:18px;
    border:1px solid rgba(255,255,255,.65);
    color:white;
    font-size:24px;
    font-weight:bold;
    letter-spacing:4px;
    cursor:pointer;
    background:linear-gradient(90deg,#c00000,#5c0000);
    box-shadow:0 0 8px rgba(255,255,255,.25),0 0 18px rgba(255,0,0,.35);
    transition:.3s;
}

.botonFicha{
    width:240px;
    padding:15px;
    border-radius:16px;
    border:1px solid rgba(255,255,255,.42);
    color:white;
    font-size:15px;
    font-weight:bold;
    letter-spacing:2px;
    cursor:pointer;
    background:linear-gradient(135deg,#211b05,#8a6f00,#090701);
    box-shadow:0 0 8px rgba(255,255,255,.12),0 0 12px rgba(255,243,176,.28);
    transition:.3s;
}

.botonNingen:hover{transform:scale(1.04)}

.botonFicha:hover{
    transform:translateX(6px);
    box-shadow:0 0 12px rgba(255,255,255,.25),0 0 18px rgba(255,243,176,.55);
}

.panelInfo{
    position:fixed;
    left:330px;
    top:210px;
    width:470px;
    min-height:330px;
    max-height:62vh;
    overflow-y:auto;
    padding:28px;
    border-radius:20px;
    border:1px solid rgba(255,255,255,.22);
    background:rgba(0,0,0,.48);
    backdrop-filter:blur(5px);
    z-index:20;
}

.panelInfo h2{
    font-size:25px;
    letter-spacing:4px;
    color:#fff5c7;
    margin-bottom:18px;
}

.panelInfo p{
    font-size:16px;
    line-height:1.65;
    color:rgba(255,255,255,.84);
}

.zonaCentral{
    position:fixed;
    top:185px;
    right:110px;
    width:520px;
    bottom:60px;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:8;
}

.splashPersonaje{
    max-width:100%;
    max-height:100%;
    object-fit:contain;
    filter:drop-shadow(0 0 24px rgba(255,243,176,.45));
}

@media (max-width:768px){
    .fondoPersonaje{
        object-position:center center;
        opacity:.86;
        filter:brightness(.70) contrast(1.12) saturate(.92);
    }

    .titulo{
        top:22px;
        font-size:27px;
        letter-spacing:4px;
        width:90%;
        text-align:center;
    }

    .subtitulo{
        top:68px;
        font-size:10px;
        width:90%;
        letter-spacing:2px;
    }

    .selectorVisual{
        top:88px;
        gap:5px;
        width:90%;
        justify-content:center;
    }

    .selectorVisual button{
        padding:5px 8px;
        font-size:8px;
        border-radius:8px;
        letter-spacing:1px;
    }

    .sonido{
        width:42px;
        height:42px;
        right:13px;
        top:13px;
        font-size:20px;
    }

    .zonaCentral{
        top:105px;
        left:5px;
        right:5px;
        width:auto;
        bottom:165px;
        align-items:center;
    }

    .splashPersonaje{
        max-width:96%;
        max-height:100%;
    }

    .menuLateral{
        left:8px;
        top:auto;
        bottom:8px;
        transform:none;
        width:46%;
        gap:4px;
    }

    .botonNingen{
        width:100%;
        padding:8px;
        font-size:14px;
        border-radius:10px;
        letter-spacing:3px;
    }

    .botonFicha{
        width:100%;
        padding:6px;
        font-size:8.5px;
        border-radius:9px;
        letter-spacing:1px;
        background:rgba(0,0,0,.35);
        border:1px solid rgba(255,255,255,.32);
        box-shadow:none;
    }

    .panelInfo{
        left:auto;
        top:auto;
        right:8px;
        bottom:8px;
        width:46%;
        min-height:160px;
        max-height:260px;
        overflow-y:auto;
        padding:11px;
        border-radius:12px;
        background:rgba(0,0,0,.34);
    }

    .panelInfo h2{
        font-size:11px;
        letter-spacing:1px;
        margin-bottom:7px;
    }

    .panelInfo p{
        font-size:9px;
        line-height:1.35;
    }
}
</style>
</head>

<body>

<img class="fondoPersonaje" src="Logo El Patriarca.png" alt="Fondo Enoc El Patriarca">

<audio id="audioFondo" loop>
    <source src="Soundtrack Patriarca.mp3" type="audio/mpeg">
</audio>

<div class="capaOscura"></div>

<button class="sonido" id="botonSonido" onclick="toggleSonido()">🔇</button>

<div class="titulo">ENOC</div>
<div class="subtitulo">Archivo NINGEN // El Patriarca</div>

<div class="selectorVisual">
    <button onclick="mostrarVisual('splash')">SPLASH ART</button>
    <button onclick="mostrarVisual('carta')">CARTA</button>
    <button onclick="mostrarVisual('boceto')">BOCETO</button>
</div>

<div class="panelInfo">
    <h2 id="tituloInfo">ARCHIVO</h2>
    <p id="textoInfo">Selecciona una categoría para desplegar información de Enoc.</p>
</div>

<div class="zonaCentral">
    <img id="imagenPrincipal" class="splashPersonaje" src="Splash Art El Patriarca.png" alt="Enoc El Patriarca">
</div>

<div class="menuLateral">
    <button class="botonNingen" onclick="window.location.href='index.html'">NINGEN</button>

    <button class="botonFicha" onclick="mostrarInfo('IDENTIDAD')">IDENTIDAD</button>
    <button class="botonFicha" onclick="mostrarInfo('ORIGEN')">ORIGEN</button>
    <button class="botonFicha" onclick="mostrarInfo('DESCRIPCIÓN')">DESCRIPCIÓN</button>
    <button class="botonFicha" onclick="mostrarInfo('PERSONALIDAD')">PERSONALIDAD</button>
    <button class="botonFicha" onclick="mostrarInfo('HISTORIA')">HISTORIA</button>
    <button class="botonFicha" onclick="mostrarInfo('HABILIDADES')">HABILIDADES</button>
    <button class="botonFicha" onclick="mostrarInfo('FRAGMENTOS')">FRAGMENTOS</button>
    <button class="botonFicha" onclick="mostrarInfo('RELACIONES')">RELACIONES</button>
    <button class="botonFicha" onclick="mostrarInfo('REGISTROS')">REGISTROS</button>
    <button class="botonFicha" onclick="mostrarInfo('CLASIFICACIÓN')">CLASIFICACIÓN</button>
</div>

<script>
function toggleSonido(){
    const audio=document.getElementById("audioFondo");
    const boton=document.getElementById("botonSonido");

    if(audio.paused){
        audio.volume=.55;
        audio.play();
        boton.textContent="🔊";
    }else{
        audio.pause();
        boton.textContent="🔇";
    }
}

function mostrarVisual(tipo){
    const img=document.getElementById("imagenPrincipal");

    if(tipo==="splash"){
        img.src="Splash Art El Patriarca.png";
        img.alt="Enoc El Patriarca";
    }

    if(tipo==="carta"){
        img.src="Carta El Patriarca.png";
        img.alt="Carta Enoc El Patriarca";
    }

    if(tipo==="boceto"){
        img.src="Boceto El Patriarca.png";
        img.alt="Boceto Enoc El Patriarca";
    }
}

function mostrarInfo(seccion){
    const titulo=document.getElementById("tituloInfo");
    const texto=document.getElementById("textoInfo");

    const info={
        "IDENTIDAD":`
            <strong>Nombre:</strong> Enoc<br>
            <strong>Alias:</strong> El Patriarca, Aquel que Tiene Acceso.<br>
            <strong>Raza:</strong> Humano<br>
            <strong>Sexo:</strong> Masculino<br>
            <strong>Edad aparente:</strong> 70 años<br>
            <strong>Edad real:</strong> aproximadamente 2600 años<br>
            <strong>Estado:</strong> Activo<br>
            <strong>Primera aparición conocida:</strong> registros incompletos de una antigua orden patriarcal.
        `,

        "ORIGEN":`
            Enoc aparece en los registros como una figura humana de origen incierto.<br><br>
            Durante siglos su nombre fue tratado como una referencia menor dentro de archivos antiguos, sin que nadie comprendiera realmente su importancia.<br><br>
            Su longevidad está vinculada al Fragmento de Energía, aunque durante gran parte de su vida ocultó el verdadero alcance de sus capacidades.<br><br>
            Para la mayoría, Enoc era solo un hombre excepcional. Para los registros Ningen, era algo mucho más raro: alguien capaz de acumular energía durante períodos imposibles.
        `,

        "DESCRIPCIÓN":`
            Anciano de barba blanca, mirada profunda y presencia solemne.<br><br>
            Su cuerpo muestra desgaste, pero no de la forma esperada para alguien de su edad real.<br><br>
            A pesar de su apariencia envejecida, conserva una vitalidad extraña y una calma difícil de alterar.<br><br>
            Quienes han estado frente a él aseguran que su mirada no intimida por fuerza, sino por la sensación de que ya ha visto demasiado.
        `,

        "PERSONALIDAD":`
            Enoc es reservado, paciente y extremadamente cuidadoso con sus palabras.<br><br>
            No suele explicar lo que sabe. Tampoco intenta demostrar que tiene razón.<br><br>
            Ha vivido lo suficiente para entender que ciertas respuestas pueden destruir más que una mentira.<br><br>
            Su mayor virtud es la prudencia. Su mayor peligro es el silencio.
        `,

        "HISTORIA":`
            Enoc fue nombrado Patriarca cuando aparentaba treinta años.<br><br>
            Sus habilidades ya eran consideradas excepcionales, aunque nadie conocía su vínculo real con el Fragmento de Energía.<br><br>
            El cargo reforzó su acceso a conocimientos, rituales y estructuras antiguas que le permitieron perfeccionar una técnica única: acumular energía durante diez años para establecer contacto con La Verdad.<br><br>
            En 2015 realizó contacto con un ser divino, aunque algunos registros sugieren que ya había hecho contacto anteriormente.<br><br>
            Lo que preguntó antes de esa fecha permanece fuera de los archivos conocidos.
        `,

        "HABILIDADES":`
            <strong>Fragmento de Energía:</strong> manipulación avanzada de energía vital y espiritual.<br><br>
            <strong>Acumulación Prolongada:</strong> puede reunir energía durante décadas sin disiparla.<br><br>
            <strong>Contacto con La Verdad:</strong> capacidad atribuida a Enoc, aunque no aceptada por todos los registros.<br><br>
            <strong>Longevidad Extendida:</strong> ha vivido más de dos milenios.<br><br>
            <strong>Milagros Menores:</strong> fenómenos de sanación, protección y presencia energética atribuidos a su figura.
        `,

        "FRAGMENTOS":`
            <strong>Fragmento asociado:</strong> Energía.<br><br>
            Enoc no posee fuerza destructiva comparable a otros portadores.<br><br>
            Su peligro no proviene del combate, sino del uso sostenido y refinado de la energía a lo largo de siglos.<br><br>
            Se cree que el contacto con La Verdad consume enormes cantidades de energía acumulada.<br><br>
            Cada intento deja una marca visible en su cuerpo.
        `,

        "RELACIONES":`
            <strong>La Verdad:</strong> entidad con la que Enoc asegura haber establecido contacto. La autenticidad de estos encuentros continúa siendo discutida.<br><br>
            <strong>Los Templarios:</strong> grupo encargado de proteger al Patriarca y resguardar los lugares donde realiza sus períodos de acumulación energética.<br><br>
            <strong>La Institución Patriarcal:</strong> estructura que lo reconoció como líder sin comprender completamente el origen de sus capacidades.
        `,

        "REGISTROS":`
            <strong>Registro 701:</strong> La Pregunta Conservada. Fecha: 2015.<br><br>
            <strong>Patriarca:</strong> "¿Qué criterio utilizas para decidir el destino de las almas?"<br><br>
            <strong>La Verdad:</strong> "Yo no lo decido."<br><br>
            Fin del registro.<br><br>
            <strong>Registro 702:</strong> Autenticidad. Algunos creen que Enoc realmente tiene acceso. Otros sostienen que se trata de un falso Patriarca.
        `,

        "CLASIFICACIÓN":`
            <strong>Tipo:</strong> Humano<br>
            <strong>Nivel de amenaza:</strong> ⭐⭐⭐⭐⭐<br>
            <strong>Importancia histórica:</strong> 10/10<br>
            <strong>Nivel de conocimiento:</strong> Prohibido<br>
            <strong>Estado:</strong> Activo<br>
            <strong>Riesgo para la humanidad:</strong> Bajo / Desconocido<br>
            <strong>Clasificación Ningen:</strong> Portador de Energía
        `
    };

    titulo.textContent=seccion;
    texto.innerHTML=info[seccion];
}
</script>

</body>
</html>
