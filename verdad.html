<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LA VERDAD | NINGEN</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
    font-family:Segoe UI, sans-serif;
    background:black;
    color:white;
    overflow:hidden;
}

.fondoPersonaje{
    position:fixed;
    inset:0;
    width:100vw;
    height:100vh;
    object-fit:cover;
    object-position:center center;
    opacity:.98;
    z-index:-2;
    filter:brightness(.88) contrast(1.12) saturate(.88);
}

.capaOscura{
    position:fixed;
    inset:0;
    background:
        radial-gradient(circle at center, rgba(0,0,0,.02), rgba(0,0,0,.62) 82%),
        rgba(0,0,0,.16);
    z-index:-1;
}

.sonido{
    position:fixed;
    right:30px;
    top:30px;
    width:58px;
    height:58px;
    border-radius:50%;
    border:2px solid white;
    background:rgba(0,0,0,.55);
    color:white;
    font-size:28px;
    cursor:pointer;
    z-index:40;
    box-shadow:0 0 12px white;
}

.titulo{
    position:fixed;
    top:35px;
    left:50%;
    transform:translateX(-50%);
    font-size:55px;
    letter-spacing:10px;
    text-shadow:0 0 12px #ffffff,0 0 35px #cfcfcf;
    z-index:5;
}

.subtitulo{
    position:fixed;
    top:110px;
    left:50%;
    transform:translateX(-50%);
    font-size:16px;
    letter-spacing:4px;
    color:#f2f2f2;
    text-align:center;
    z-index:5;
}

.selectorVisual{
    position:fixed;
    top:145px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:12px;
    z-index:30;
}

.selectorVisual button{
    padding:10px 22px;
    border-radius:14px;
    border:1px solid rgba(255,255,255,.42);
    background:rgba(0,0,0,.45);
    color:#f2f2f2;
    font-weight:bold;
    letter-spacing:2px;
    cursor:pointer;
    box-shadow:0 0 10px rgba(255,255,255,.25);
}

.selectorVisual button:hover{
    box-shadow:0 0 18px rgba(255,255,255,.65);
}

.menuLateral{
    position:fixed;
    left:25px;
    top:50%;
    transform:translateY(-50%);
    display:flex;
    flex-direction:column;
    gap:12px;
    z-index:30;
}

.botonNingen{
    width:240px;
    padding:18px;
    border-radius:18px;
    border:1px solid rgba(255,255,255,.65);
    color:white;
    font-size:24px;
    font-weight:bold;
    letter-spacing:4px;
    cursor:pointer;
    background:linear-gradient(90deg,#c00000,#5c0000);
    box-shadow:0 0 8px rgba(255,255,255,.25),0 0 18px rgba(255,0,0,.35);
    transition:.3s;
}

.botonFicha{
    width:240px;
    padding:15px;
    border-radius:16px;
    border:1px solid rgba(255,255,255,.42);
    color:white;
    font-size:15px;
    font-weight:bold;
    letter-spacing:2px;
    cursor:pointer;
    background:linear-gradient(135deg,#111,#777,#050505);
    box-shadow:0 0 8px rgba(255,255,255,.12),0 0 12px rgba(255,255,255,.28);
    transition:.3s;
}

.botonNingen:hover{transform:scale(1.04)}

.botonFicha:hover{
    transform:translateX(6px);
    box-shadow:0 0 12px rgba(255,255,255,.25),0 0 18px rgba(255,255,255,.55);
}

.panelInfo{
    position:fixed;
    left:330px;
    top:210px;
    width:470px;
    min-height:330px;
    max-height:62vh;
    overflow-y:auto;
    padding:28px;
    border-radius:20px;
    border:1px solid rgba(255,255,255,.22);
    background:rgba(0,0,0,.46);
    backdrop-filter:blur(5px);
    z-index:20;
}

.panelInfo h2{
    font-size:25px;
    letter-spacing:4px;
    color:#f2f2f2;
    margin-bottom:18px;
}

.panelInfo p{
    font-size:16px;
    line-height:1.65;
    color:rgba(255,255,255,.84);
}

.zonaCentral{
    position:fixed;
    top:185px;
    right:110px;
    width:520px;
    bottom:60px;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:8;
}

.splashPersonaje{
    max-width:100%;
    max-height:100%;
    object-fit:contain;
    filter:drop-shadow(0 0 24px rgba(255,255,255,.45));
}

@media (max-width:768px){
    .fondoPersonaje{
        object-position:center center;
        opacity:.86;
        filter:brightness(.72) contrast(1.1) saturate(.85);
    }

    .titulo{
        top:22px;
        font-size:27px;
        letter-spacing:4px;
        width:90%;
        text-align:center;
    }

    .subtitulo{
        top:68px;
        font-size:10px;
        width:90%;
        letter-spacing:2px;
    }

    .selectorVisual{
        top:88px;
        gap:5px;
        width:90%;
        justify-content:center;
    }

    .selectorVisual button{
        padding:5px 8px;
        font-size:8px;
        border-radius:8px;
        letter-spacing:1px;
    }

    .sonido{
        width:42px;
        height:42px;
        right:13px;
        top:13px;
        font-size:20px;
    }

    .zonaCentral{
        top:105px;
        left:5px;
        right:5px;
        width:auto;
        bottom:165px;
        align-items:center;
    }

    .splashPersonaje{
        max-width:96%;
        max-height:100%;
    }

    .menuLateral{
        left:8px;
        top:auto;
        bottom:8px;
        transform:none;
        width:46%;
        gap:4px;
    }

    .botonNingen{
        width:100%;
        padding:8px;
        font-size:14px;
        border-radius:10px;
        letter-spacing:3px;
    }

    .botonFicha{
        width:100%;
        padding:6px;
        font-size:8.5px;
        border-radius:9px;
        letter-spacing:1px;
        background:rgba(0,0,0,.35);
        border:1px solid rgba(255,255,255,.32);
        box-shadow:none;
    }

    .panelInfo{
        left:auto;
        top:auto;
        right:8px;
        bottom:8px;
        width:46%;
        min-height:160px;
        max-height:260px;
        overflow-y:auto;
        padding:11px;
        border-radius:12px;
        background:rgba(0,0,0,.34);
    }

    .panelInfo h2{
        font-size:11px;
        letter-spacing:1px;
        margin-bottom:7px;
    }

    .panelInfo p{
        font-size:9px;
        line-height:1.35;
    }
}
</style>
</head>

<body>

<img class="fondoPersonaje" src="Logo La Verdad.png" alt="Fondo La Verdad">

<audio id="audioFondo" loop>
    <source src="Soundtrack Verdad.mp3" type="audio/mpeg">
</audio>

<div class="capaOscura"></div>

<button class="sonido" id="botonSonido" onclick="toggleSonido()">🔇</button>

<div class="titulo">LA VERDAD</div>
<div class="subtitulo">Archivo NINGEN // Soy el que soy</div>

<div class="selectorVisual">
    <button onclick="mostrarVisual('splash')">SPLASH ART</button>
    <button onclick="mostrarVisual('carta')">CARTA</button>
    <button onclick="mostrarVisual('boceto')">BOCETO</button>
</div>

<div class="panelInfo">
    <h2 id="tituloInfo">ARCHIVO</h2>
    <p id="textoInfo">Selecciona una categoría para desplegar información de La Verdad.</p>
</div>

<div class="zonaCentral">
    <img id="imagenPrincipal" class="splashPersonaje" src="Splash Art La Verdad.png" alt="La Verdad">
</div>

<div class="menuLateral">
    <button class="botonNingen" onclick="window.location.href='index.html'">NINGEN</button>

    <button class="botonFicha" onclick="mostrarInfo('IDENTIDAD')">IDENTIDAD</button>
    <button class="botonFicha" onclick="mostrarInfo('ORIGEN')">ORIGEN</button>
    <button class="botonFicha" onclick="mostrarInfo('DESCRIPCIÓN')">DESCRIPCIÓN</button>
    <button class="botonFicha" onclick="mostrarInfo('PERSONALIDAD')">PERSONALIDAD</button>
    <button class="botonFicha" onclick="mostrarInfo('HISTORIA')">HISTORIA</button>
    <button class="botonFicha" onclick="mostrarInfo('HABILIDADES')">HABILIDADES</button>
    <button class="botonFicha" onclick="mostrarInfo('FRAGMENTOS')">FRAGMENTOS</button>
    <button class="botonFicha" onclick="mostrarInfo('RELACIONES')">RELACIONES</button>
    <button class="botonFicha" onclick="mostrarInfo('REGISTROS')">REGISTROS</button>
    <button class="botonFicha" onclick="mostrarInfo('CLASIFICACIÓN')">CLASIFICACIÓN</button>
</div>

<script>
function toggleSonido(){
    const audio=document.getElementById("audioFondo");
    const boton=document.getElementById("botonSonido");

    if(audio.paused){
        audio.volume=.55;
        audio.play();
        boton.textContent="🔊";
    }else{
        audio.pause();
        boton.textContent="🔇";
    }
}

function mostrarVisual(tipo){
    const img=document.getElementById("imagenPrincipal");

    if(tipo==="splash"){
        img.src="Splash Art La Verdad.png";
        img.alt="La Verdad";
    }

    if(tipo==="carta"){
        img.src="Carta La Verdad.png";
        img.alt="Carta La Verdad";
    }

    if(tipo==="boceto"){
        img.src="Boceto La Verdad.png";
        img.alt="Boceto La Verdad";
    }
}

function mostrarInfo(seccion){
    const titulo=document.getElementById("tituloInfo");
    const texto=document.getElementById("textoInfo");

    const info={
        "IDENTIDAD":`
            <strong>Nombre:</strong> La Verdad<br>
            <strong>Títulos:</strong> Dios, La Verdad, Antes y Después, El Origen y el Final, Soy el que soy.<br>
            <strong>Raza:</strong> No aplica<br>
            <strong>Sexo:</strong> No aplica<br>
            <strong>Edad aparente:</strong> No aplica<br>
            <strong>Edad real:</strong> ⟲ eterno<br>
            <strong>Estado:</strong> Pasado, presente y futuro<br>
            <strong>Primera aparición conocida:</strong> indetectable.
        `,

        "ORIGEN":`
            No existe registro de origen.<br><br>
            No existe punto inicial comprobable.<br><br>
            No existe un antes verificable.<br><br>
            Toda investigación sobre el origen de La Verdad termina enfrentando una contradicción: para encontrar su inicio, primero debería existir algo anterior a ella.
        `,

        "DESCRIPCIÓN":`
            Nadie ha visto directamente a La Verdad.<br><br>
            El único testimonio parcialmente asociado a su presencia proviene de Enoc.<br><br>
            Durante uno de sus contactos, el Patriarca afirmó haber alcanzado a percibir una figura blanca.<br><br>
            No existen más detalles.<br><br>
            No existen representaciones confirmadas.
        `,

        "PERSONALIDAD":`
            Inconsistente.<br><br>
            O quizás demasiado consistente.<br><br>
            Los registros disponibles no permiten determinar si La Verdad posee emociones, preferencias o voluntad reconocible.<br><br>
            Sus respuestas, cuando existen, son breves, directas y suficientes.
        `,

        "HISTORIA":`
            No existe una historia conocida de La Verdad.<br><br>
            Toda historia requiere un comienzo.<br><br>
            Los registros no han logrado identificar uno.<br><br>
            La humanidad ha intentado nombrarla de muchas formas, pero ningún nombre parece contenerla por completo.
        `,

        "HABILIDADES":`
            <strong>Todo.</strong><br><br>
            No existe evidencia verificable de un límite.<br><br>
            Conocimiento, creación, destrucción, tiempo, espacio, vida y muerte aparecen vinculados a su existencia.<br><br>
            No se han registrado restricciones.
        `,

        "FRAGMENTOS":`
            <strong>Fragmento asociado:</strong> Ninguno.<br><br>
            La Verdad no posee fragmentos.<br><br>
            Los fragmentos pertenecen a la realidad y a sus reglas.<br><br>
            La Verdad parece existir antes, durante y después de esas reglas.
        `,

        "RELACIONES":`
            <strong>Enoc:</strong> único ser humano asociado al contacto con La Verdad.
        `,

        "REGISTROS":`
            <strong>Registro 000:</strong> No existe evidencia de la creación de La Verdad.<br><br>
            <strong>Registro 701:</strong> Contacto atribuido a Enoc.<br><br>
            <strong>Patriarca:</strong> "¿Qué criterio utilizas para decidir el destino de las almas?"<br><br>
            <strong>La Verdad:</strong> "Yo no lo decido."<br><br>
            <strong>Registro 999:</strong> Toda pregunta posee una respuesta. La Verdad también.
        `,

        "CLASIFICACIÓN":`
            <strong>Tipo:</strong> Inclasificable<br>
            <strong>Nivel de amenaza:</strong> No aplicable<br>
            <strong>Importancia histórica:</strong> No aplicable<br>
            <strong>Nivel de conocimiento:</strong> Absoluto<br>
            <strong>Estado:</strong> Pasado, presente y futuro<br>
            <strong>Riesgo para la humanidad:</strong> No aplicable<br>
            <strong>Clasificación Ningen:</strong> La Verdad
        `
    };

    titulo.textContent=seccion;
    texto.innerHTML=info[seccion];
}
</script>

</body>
</html>
