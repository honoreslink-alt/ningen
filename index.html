<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NINGEN</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
    font-family:Segoe UI, sans-serif;
    overflow:hidden;
    background:black;
}

#videoFondo{
    position:fixed;
    top:0;
    left:0;
    width:100vw;
    height:100vh;
    object-fit:cover;
    z-index:-2;
}

.capaOscura{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.45);
    z-index:-1;
}

.logo{
    position:absolute;
    top:35px;
    left:50%;
    transform:translateX(-50%);
    color:white;
    font-size:95px;
    letter-spacing:18px;
    text-shadow:0 0 15px white,0 0 40px white;
    z-index:5;
}

.subtitulo{
    position:absolute;
    top:155px;
    left:50%;
    transform:translateX(-50%);
    color:white;
    font-size:20px;
    letter-spacing:4px;
    text-align:center;
    z-index:5;
}

.menu{
    position:fixed;
    left:25px;
    top:50%;
    transform:translateY(-50%);
    display:flex;
    flex-direction:column;
    gap:20px;
    z-index:10;
}

.boton{
    width:240px;
    padding:22px;
    border:none;
    border-radius:18px;
    color:white;
    font-size:22px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

.boton:hover{
    transform:scale(1.06);
}

.ningen{
    background:linear-gradient(90deg,#ff0000,#220000);
    box-shadow:0 0 15px #ff0000,0 0 40px #ff0000;
}

.bestiario{
    background:linear-gradient(90deg,#00ff66,#001a0d);
    box-shadow:0 0 15px #00ff66,0 0 40px #00ff66;
}

.interlink{
    background:linear-gradient(90deg,#00c8ff,#00121a);
    box-shadow:0 0 15px #00c8ff,0 0 40px #00c8ff;
}

.sonido{
    position:fixed;
    right:30px;
    top:30px;
    width:58px;
    height:58px;
    border-radius:50%;
    border:2px solid white;
    background:rgba(0,0,0,0.55);
    color:white;
    font-size:28px;
    cursor:pointer;
    z-index:20;
    box-shadow:0 0 12px white;
}

/* PANEL DE PERSONAJES */

.panelCentral{
    position:absolute;
    top:58%;
    left:50%;
    transform:translate(-50%,-50%);
    width:min(1050px,72vw);
    max-height:68vh;
    overflow-y:auto;
    padding:10px;
    display:none;
    grid-template-columns:repeat(4,1fr);
    gap:16px;
    z-index:8;
}

.panelCentral.activo{
    display:grid;
}

.cardPersonaje{
    position:relative;
    height:220px;
    border-radius:16px;
    overflow:hidden;
    cursor:pointer;
    background:#111;
    border:1px solid rgba(255,255,255,.16);
    box-shadow:0 10px 25px rgba(0,0,0,.55);
    transition:.3s;
}

.cardPersonaje:hover{
    transform:scale(1.04);
}

.cardPersonaje img{
    width:100%;
    height:100%;
    object-fit:cover;
    transition:.4s;
}

.cardPersonaje:hover img{
    transform:scale(1.08);
}

.nombrePersonaje{
    position:absolute;
    left:0;
    bottom:0;
    width:100%;
    padding:42px 8px 13px;
    text-align:center;
    color:white;
    font-size:14px;
    font-weight:bold;
    letter-spacing:1px;
    background:linear-gradient(
        to top,
        rgba(0,0,0,.96),
        rgba(0,0,0,.65),
        transparent
    );
}

/* CELULAR */

@media (max-width:768px){

    .logo{
        font-size:54px;
        top:25px;
        letter-spacing:8px;
    }

    .subtitulo{
        top:100px;
        font-size:13px;
        width:90%;
        letter-spacing:3px;
    }

    .menu{
        left:50%;
        top:auto;
        bottom:20px;
        transform:translateX(-50%);
        gap:10px;
    }

    .boton{
        width:235px;
        padding:13px;
        font-size:15px;
    }

    .sonido{
        width:48px;
        height:48px;
        right:18px;
        top:18px;
        font-size:23px;
    }

    .panelCentral{
        top:47%;
        width:90%;
        max-height:55vh;
        grid-template-columns:repeat(2,1fr);
        gap:10px;
        padding:6px;
    }

    .cardPersonaje{
        height:185px;
        border-radius:13px;
    }

    .nombrePersonaje{
        font-size:11px;
        padding:32px 6px 10px;
    }
}
</style>
</head>

<body>

<video id="videoFondo" autoplay muted loop playsinline>
    <source src="grok_video_2026-03-10-13-42-53.mp4" type="video/mp4">
</video>

<div class="capaOscura"></div>

<button class="sonido" id="botonSonido" onclick="toggleSonido()">🔇</button>

<div class="logo">NINGEN</div>

<div class="subtitulo">
    La humanidad frente a lo desconocido
</div>

<div class="menu">
    <button class="boton ningen" onclick="mostrarPanel('panelNingen')">NINGEN</button>
    <button class="boton bestiario" onclick="mostrarPanel('panelBestiario')">BESTIARIO</button>
    <button class="boton interlink" onclick="mostrarPanel('panelInterlink')">INTERLINK</button>
</div>

<div id="panelNingen" class="panelCentral">

    <div class="cardPersonaje">
        <img src="Splash Art El Monje.png">
        <div class="nombrePersonaje">EL MONJE</div>
    </div>

    <div class="cardPersonaje">
        <img src="Splash Art El Arquero.png">
        <div class="nombrePersonaje">EL ARQUERO</div>
    </div>

    <div class="cardPersonaje">
        <img src="Splash Art El Ogro.png">
        <div class="nombrePersonaje">EL OGRO</div>
    </div>

    <div class="cardPersonaje">
        <img src="Splash Art El Patriarca.png">
        <div class="nombrePersonaje">EL PATRIARCA</div>
    </div>

    <div class="cardPersonaje">
        <img src="Splash Art El Profesor Rev 2.png">
        <div class="nombrePersonaje">EL PROFESOR</div>
    </div>

    <div class="cardPersonaje">
        <img src="Splash Art El Templario Rev - A.png">
        <div class="nombrePersonaje">EL TEMPLARIO</div>
    </div>

    <div class="cardPersonaje">
        <img src="Splash Art El Umbral.png">
        <div class="nombrePersonaje">EL UMBRAL</div>
    </div>

    <div class="cardPersonaje">
        <img src="Splash Art Faker.png">
        <div class="nombrePersonaje">FAKER</div>
    </div>

    <div class="cardPersonaje">
        <img src="Splash Art La Tejedora.png">
        <div class="nombrePersonaje">LA TEJEDORA</div>
    </div>

    <div class="cardPersonaje">
        <img src="Splash Art La Verdad.png">
        <div class="nombrePersonaje">LA VERDAD</div>
    </div>

    <div class="cardPersonaje">
        <img src="Splash Art Lican Ray.png">
        <div class="nombrePersonaje">LICANRAY</div>
    </div>

    <div class="cardPersonaje">
        <img src="Splash Art One For Pubi.png">
        <div class="nombrePersonaje">ONE FOR PUBI</div>
    </div>

</div>

<div id="panelBestiario" class="panelCentral"></div>

<div id="panelInterlink" class="panelCentral"></div>

<script>
function mostrarPanel(idPanel){
    const paneles = document.querySelectorAll(".panelCentral");
    const panelSeleccionado = document.getElementById(idPanel);

    paneles.forEach(panel => {
        if(panel !== panelSeleccionado){
            panel.classList.remove("activo");
        }
    });

    panelSeleccionado.classList.toggle("activo");
}

function toggleSonido(){
    const video=document.getElementById("videoFondo");
    const boton=document.getElementById("botonSonido");

    video.muted = !video.muted;

    if(video.muted){
        boton.textContent="🔇";
    }else{
        video.play();
        boton.textContent="🔊";
    }
}
</script>

</body>
</html>
