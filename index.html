<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NINGEN</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
    font-family:Segoe UI, sans-serif;
    background:black;
    color:white;
    overflow:hidden;
}

#videoFondo{
    position:fixed;
    top:0;
    left:0;
    width:100vw;
    height:100vh;
    object-fit:cover;
    z-index:-2;
}

.capaOscura{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.55);
    z-index:-1;
}

.logo{
    position:fixed;
    top:35px;
    left:50%;
    transform:translateX(-50%);
    color:white;
    font-size:95px;
    letter-spacing:18px;
    text-shadow:0 0 15px white,0 0 40px white;
    z-index:5;
}

.subtitulo{
    position:fixed;
    top:155px;
    left:50%;
    transform:translateX(-50%);
    color:white;
    font-size:20px;
    letter-spacing:4px;
    text-align:center;
    z-index:5;
}

.menu{
    position:fixed;
    left:25px;
    top:50%;
    transform:translateY(-50%);
    display:flex;
    flex-direction:column;
    gap:20px;
    z-index:30;
}

.boton{
    width:240px;
    padding:22px;
    border:none;
    border-radius:18px;
    color:white;
    font-size:22px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

.boton:hover{
    transform:scale(1.06);
}

.ningen{
    background:linear-gradient(90deg,#ff0000,#220000);
    box-shadow:0 0 15px #ff0000,0 0 40px #ff0000;
}

.bestiario{
    background:linear-gradient(90deg,#00ff66,#001a0d);
    box-shadow:0 0 15px #00ff66,0 0 40px #00ff66;
}

.interlink{
    background:linear-gradient(90deg,#00c8ff,#00121a);
    box-shadow:0 0 15px #00c8ff,0 0 40px #00c8ff;
}

.sonido{
    position:fixed;
    right:30px;
    top:30px;
    width:58px;
    height:58px;
    border-radius:50%;
    border:2px solid white;
    background:rgba(0,0,0,0.55);
    color:white;
    font-size:28px;
    cursor:pointer;
    z-index:40;
    box-shadow:0 0 12px white;
}

/* PANEL SPLASH ART */

.panelNingen{
    position:fixed;
    top:210px;
    left:330px;
    right:55px;
    bottom:35px;
    display:none;
    overflow-y:auto;
    padding:10px 10px 35px;
    z-index:10;
    scrollbar-width:none;
}

.panelNingen::-webkit-scrollbar{
    display:none;
}

.panelNingen.activo{
    display:block;
}

.gridPersonajes{
    max-width:1250px;
    margin:0 auto;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:28px;
}

.cardPersonaje{
    position:relative;
    height:430px;
    border-radius:20px;
    overflow:hidden;
    cursor:pointer;
    background:#111;
    border:1px solid rgba(255,255,255,.15);
    box-shadow:0 12px 35px rgba(0,0,0,.65);
    transition:.3s;
}

.cardPersonaje:hover{
    transform:translateY(-6px) scale(1.02);
}

.cardPersonaje img{
    width:100%;
    height:100%;
    object-fit:cover;
    transition:.45s;
}

.cardPersonaje:hover img{
    transform:scale(1.08);
}

.nombrePersonaje{
    position:absolute;
    left:0;
    bottom:0;
    width:100%;
    padding:70px 15px 22px;
    text-align:center;
    font-size:23px;
    font-weight:bold;
    letter-spacing:2px;
    background:linear-gradient(
        to top,
        rgba(0,0,0,.98),
        rgba(0,0,0,.72),
        transparent
    );
}

.mensajeTemporal{
    position:fixed;
    top:58%;
    left:50%;
    transform:translate(-50%,-50%);
    color:white;
    font-size:34px;
    letter-spacing:4px;
    text-align:center;
    display:none;
    z-index:12;
    background:rgba(0,0,0,.45);
    padding:30px 50px;
    border-radius:20px;
    border:1px solid rgba(255,255,255,.18);
}

.mensajeTemporal.activo{
    display:block;
}

/* CELULAR */

@media (max-width:768px){

    .logo{
        font-size:54px;
        top:25px;
        letter-spacing:8px;
    }

    .subtitulo{
        top:100px;
        font-size:13px;
        width:90%;
        letter-spacing:3px;
    }

    .menu{
        left:50%;
        top:auto;
        bottom:20px;
        transform:translateX(-50%);
        gap:10px;
    }

    .boton{
        width:235px;
        padding:13px;
        font-size:15px;
    }

    .sonido{
        width:48px;
        height:48px;
        right:18px;
        top:18px;
        font-size:23px;
    }

    .panelNingen{
        top:135px;
        left:12px;
        right:12px;
        bottom:205px;
        padding:5px 5px 20px;
    }

    .gridPersonajes{
        grid-template-columns:repeat(2,1fr);
        gap:13px;
    }

    .cardPersonaje{
        height:255px;
        border-radius:14px;
    }

    .nombrePersonaje{
        font-size:13px;
        letter-spacing:1px;
        padding:45px 8px 12px;
    }

    .mensajeTemporal{
        top:43%;
        width:85%;
        font-size:20px;
        padding:22px;
    }
}
</style>
</head>

<body>

<video id="videoFondo" autoplay muted loop playsinline>
    <source src="grok_video_2026-03-10-13-42-53.mp4" type="video/mp4">
</video>

<div class="capaOscura"></div>

<button class="sonido" id="botonSonido" onclick="toggleSonido()">🔇</button>

<div class="logo">NINGEN</div>

<div class="subtitulo">
    La humanidad frente a lo desconocido
</div>

<div class="menu">
    <button class="boton ningen" onclick="toggleNingen()">NINGEN</button>

</div>

<div id="panelNingen" class="panelNingen">

    <div class="gridPersonajes">

        <div class="cardPersonaje" onclick="window.location.href='monje.html'">
            <img src="Splash Art El Monje.png">
            <div class="nombrePersonaje">EL MONJE</div>
        </div>

        <div class="cardPersonaje" onclick="window.location.href='arquero.html'">
            <img src="Splash Art El Arquero.png">
            <div class="nombrePersonaje">EL ARQUERO</div>
        </div>

        <div class="cardPersonaje" onclick="window.location.href='ogro.html'">
            <img src="Splash Art El Ogro.png">
            <div class="nombrePersonaje">EL OGRO</div>
        </div>

        <div class="cardPersonaje" onclick="window.location.href='patriarca.html'">
            <img src="Splash Art El Patriarca.png">
            <div class="nombrePersonaje">EL PATRIARCA</div>
        </div>

        <div class="cardPersonaje" onclick="window.location.href='profesor.html'">
            <img src="Splash Art El Profesor Rev 2.png">
            <div class="nombrePersonaje">EL PROFESOR</div>
        </div>

        <div class="cardPersonaje" onclick="window.location.href='templario.html'">
            <img src="Splash Art El Templario Rev - A.png">
            <div class="nombrePersonaje">EL TEMPLARIO</div>
        </div>

        <div class="cardPersonaje" onclick="window.location.href='umbral.html'">
            <img src="Splash Art El Umbral.png">
            <div class="nombrePersonaje">EL UMBRAL</div>
        </div>

        <div class="cardPersonaje" onclick="window.location.href='faker.html'">
            <img src="Splash Art Faker.png">
            <div class="nombrePersonaje">FAKER</div>
        </div>

        <div class="cardPersonaje" onclick="window.location.href='tejedora.html'">
            <img src="Splash Art La Tejedora.png">
            <div class="nombrePersonaje">LA TEJEDORA</div>
        </div>

        <div class="cardPersonaje" onclick="window.location.href='verdad.html'">
            <img src="Splash Art La Verdad.png">
            <div class="nombrePersonaje">LA VERDAD</div>
        </div>

        <div class="cardPersonaje" onclick="window.location.href='licanray.html'">
            <img src="Splash Art Lican Ray.png">
            <div class="nombrePersonaje">LICANRAY</div>
        </div>

        <div class="cardPersonaje" onclick="window.location.href='pubi.html'">
            <img src="Splash Art One For Pubi.png">
            <div class="nombrePersonaje">ONE FOR PUBI</div>
        </div>

    </div>

</div>


    <script>
function toggleNingen(){
    const panelNingen = document.getElementById("panelNingen");
    panelNingen.classList.toggle("activo");
}

function toggleSonido(){
    const video=document.getElementById("videoFondo");
    const boton=document.getElementById("botonSonido");

    video.muted = !video.muted;

    if(video.muted){
        boton.textContent="🔇";
    }else{
        video.play();
        boton.textContent="🔊";
    }
}
</script>

</body>
</html>
