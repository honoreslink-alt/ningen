<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NINGEN</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Segoe UI, sans-serif;
    overflow:hidden;
    background:black;
}

/* VIDEO FONDO */

#videoFondo{
    position:fixed;
    top:0;
    left:0;
    width:100vw;
    height:100vh;
    object-fit:cover;
    z-index:-2;
}

/* OSCURECER UN POCO */

.capaOscura{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.45);
    z-index:-1;
}

/* MENÚ */

.menu{
    position:fixed;
    left:25px;
    top:50%;
    transform:translateY(-50%);
    display:flex;
    flex-direction:column;
    gap:20px;
}

/* BOTONES */

.boton{
    width:240px;
    padding:22px;
    border:none;
    border-radius:18px;

    color:white;
    font-size:22px;
    font-weight:bold;
    cursor:pointer;

    transition:.3s;
}

/* NINGEN */

.ningen{
    background:linear-gradient(
        90deg,
        #ff0000,
        #220000
    );

    box-shadow:
    0 0 15px #ff0000,
    0 0 40px #ff0000;
}

/* BESTIARIO */

.bestiario{
    background:linear-gradient(
        90deg,
        #00ff66,
        #001a0d
    );

    box-shadow:
    0 0 15px #00ff66,
    0 0 40px #00ff66;
}

/* INTERLINK */

.interlink{
    background:linear-gradient(
        90deg,
        #00c8ff,
        #00121a
    );

    box-shadow:
    0 0 15px #00c8ff,
    0 0 40px #00c8ff;
}

.boton:hover{
    transform:scale(1.06);
}

/* TITULO */

.logo{
    position:absolute;
    top:40px;
    left:50%;
    transform:translateX(-50%);

    color:white;

    font-size:120px;
    letter-spacing:18px;

    text-shadow:
    0 0 15px white,
    0 0 40px white;
}

.subtitulo{
    position:absolute;
    top:190px;
    left:50%;
    transform:translateX(-50%);

    color:white;
    font-size:22px;
    letter-spacing:4px;
}

</style>
</head>
<body>

<video
id="videoFondo"
autoplay
muted
loop
playsinline>

<source
src="grok_video_2026-03-10-13-42-53.mp4"
type="video/mp4">

</video>

<div class="capaOscura"></div>

<div class="logo">
NINGEN
</div>

<div class="subtitulo">
La humanidad frente a lo desconocido
</div>

<div class="menu">

<button class="boton ningen">
NINGEN
</button>

<button class="boton bestiario">
BESTIARIO
</button>

<button class="boton interlink">
INTERLINK
</button>

</div>

<script>

/*
Primer click activa sonido
*/

let activado=false;

document.addEventListener("click",()=>{

if(activado) return;

const video=document.getElementById("videoFondo");

video.muted=false;

setTimeout(()=>{
video.muted=true;
},5000);

activado=true;

});

</script>

</body>
</html>
