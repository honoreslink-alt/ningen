<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NINGEN</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
    font-family:Segoe UI, sans-serif;
    overflow:hidden;
    background:black;
}

#videoFondo{
    position:fixed;
    top:0;
    left:0;
    width:100vw;
    height:100vh;
    object-fit:cover;
    z-index:-2;
}

.capaOscura{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.45);
    z-index:-1;
}

.logo{
    position:absolute;
    top:35px;
    left:50%;
    transform:translateX(-50%);
    color:white;
    font-size:95px;
    letter-spacing:18px;
    text-shadow:0 0 15px white,0 0 40px white;
    z-index:5;
}

.subtitulo{
    position:absolute;
    top:155px;
    left:50%;
    transform:translateX(-50%);
    color:white;
    font-size:20px;
    letter-spacing:4px;
    text-align:center;
    z-index:5;
}

.menu{
    position:fixed;
    left:25px;
    top:50%;
    transform:translateY(-50%);
    display:flex;
    flex-direction:column;
    gap:20px;
    z-index:10;
}

.boton{
    width:240px;
    padding:22px;
    border:none;
    border-radius:18px;
    color:white;
    font-size:22px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

.boton:hover{
    transform:scale(1.06);
}

.ningen{
    background:linear-gradient(90deg,#ff0000,#220000);
    box-shadow:0 0 15px #ff0000,0 0 40px #ff0000;
}

.bestiario{
    background:linear-gradient(90deg,#00ff66,#001a0d);
    box-shadow:0 0 15px #00ff66,0 0 40px #00ff66;
}

.interlink{
    background:linear-gradient(90deg,#00c8ff,#00121a);
    box-shadow:0 0 15px #00c8ff,0 0 40px #00c8ff;
}

.sonido{
    position:fixed;
    right:30px;
    top:30px;
    width:58px;
    height:58px;
    border-radius:50%;
    border:2px solid white;
    background:rgba(0,0,0,0.55);
    color:white;
    font-size:28px;
    cursor:pointer;
    z-index:20;
    box-shadow:0 0 12px white;
}

@media (max-width:768px){

    .logo{
        font-size:54px;
        top:25px;
        letter-spacing:8px;
    }

    .subtitulo{
        top:100px;
        font-size:13px;
        width:90%;
        letter-spacing:3px;
    }

    .menu{
        left:50%;
        top:auto;
        bottom:20px;
        transform:translateX(-50%);
        gap:10px;
    }

    .boton{
        width:235px;
        padding:13px;
        font-size:15px;
    }

    .sonido{
        width:48px;
        height:48px;
        right:18px;
        top:18px;
        font-size:23px;
    }
}
</style>
</head>

<body>

<video id="videoFondo" autoplay muted loop playsinline>
    <source src="grok_video_2026-03-10-13-42-53.mp4" type="video/mp4">
</video>

<div class="capaOscura"></div>

<button class="sonido" id="botonSonido" onclick="toggleSonido()">🔇</button>

<div class="logo">NINGEN</div>

<div class="subtitulo">
    La humanidad frente a lo desconocido
</div>

<div class="menu">
    <button class="boton ningen" onclick="window.location.href='ningen.html'">NINGEN</button>
    <button class="boton bestiario">BESTIARIO</button>
    <button class="boton interlink">INTERLINK</button>
</div>

<script>
function toggleSonido(){
    const video=document.getElementById("videoFondo");
    const boton=document.getElementById("botonSonido");

    video.muted = !video.muted;

    if(video.muted){
        boton.textContent="🔇";
    }else{
        video.play();
        boton.textContent="🔊";
    }
}
</script>

</body>
</html>
