<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ONE FOR PUBI | NINGEN</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
    font-family:Segoe UI, sans-serif;
    background:black;
    color:white;
    overflow:hidden;
}

.fondoPersonaje{
    position:fixed;
    inset:0;
    width:100vw;
    height:100vh;
    object-fit:cover;
    object-position:center center;
    opacity:.96;
    z-index:-2;
    filter:brightness(.78) contrast(1.16) saturate(.88);
}

.capaOscura{
    position:fixed;
    inset:0;
    background:
        radial-gradient(circle at center, rgba(0,0,0,.04), rgba(0,0,0,.72) 82%),
        rgba(0,0,0,.18);
    z-index:-1;
}

.sonido{
    position:fixed;
    right:30px;
    top:30px;
    width:58px;
    height:58px;
    border-radius:50%;
    border:2px solid white;
    background:rgba(0,0,0,.55);
    color:white;
    font-size:28px;
    cursor:pointer;
    z-index:40;
    box-shadow:0 0 12px white;
}

.titulo{
    position:fixed;
    top:35px;
    left:50%;
    transform:translateX(-50%);
    font-size:55px;
    letter-spacing:10px;
    text-shadow:0 0 12px #9fffd4,0 0 35px #0b6f46;
    z-index:5;
}

.subtitulo{
    position:fixed;
    top:110px;
    left:50%;
    transform:translateX(-50%);
    font-size:16px;
    letter-spacing:4px;
    color:#d1ffeb;
    text-align:center;
    z-index:5;
}

.selectorVisual{
    position:fixed;
    top:145px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:12px;
    z-index:30;
}

.selectorVisual button{
    padding:10px 22px;
    border-radius:14px;
    border:1px solid rgba(255,255,255,.42);
    background:rgba(0,0,0,.45);
    color:#d1ffeb;
    font-weight:bold;
    letter-spacing:2px;
    cursor:pointer;
    box-shadow:0 0 10px rgba(159,255,212,.25);
}

.selectorVisual button:hover{
    box-shadow:0 0 18px rgba(159,255,212,.65);
}

.menuLateral{
    position:fixed;
    left:25px;
    top:50%;
    transform:translateY(-50%);
    display:flex;
    flex-direction:column;
    gap:12px;
    z-index:30;
}

.botonNingen{
    width:240px;
    padding:18px;
    border-radius:18px;
    border:1px solid rgba(255,255,255,.65);
    color:white;
    font-size:24px;
    font-weight:bold;
    letter-spacing:4px;
    cursor:pointer;
    background:linear-gradient(90deg,#c00000,#5c0000);
    box-shadow:0 0 8px rgba(255,255,255,.25),0 0 18px rgba(255,0,0,.35);
    transition:.3s;
}

.botonFicha{
    width:240px;
    padding:15px;
    border-radius:16px;
    border:1px solid rgba(255,255,255,.42);
    color:white;
    font-size:15px;
    font-weight:bold;
    letter-spacing:2px;
    cursor:pointer;
    background:linear-gradient(135deg,#062014,#147a52,#020b07);
    box-shadow:0 0 8px rgba(255,255,255,.12),0 0 12px rgba(159,255,212,.28);
    transition:.3s;
}

.botonNingen:hover{transform:scale(1.04)}

.botonFicha:hover{
    transform:translateX(6px);
    box-shadow:0 0 12px rgba(255,255,255,.25),0 0 18px rgba(159,255,212,.55);
}

.panelInfo{
    position:fixed;
    left:330px;
    top:210px;
    width:470px;
    min-height:330px;
    max-height:62vh;
    overflow-y:auto;
    padding:28px;
    border-radius:20px;
    border:1px solid rgba(255,255,255,.22);
    background:rgba(0,0,0,.48);
    backdrop-filter:blur(5px);
    z-index:20;
}

.panelInfo h2{
    font-size:25px;
    letter-spacing:4px;
    color:#d1ffeb;
    margin-bottom:18px;
}

.panelInfo p{
    font-size:16px;
    line-height:1.65;
    color:rgba(255,255,255,.84);
}

.zonaCentral{
    position:fixed;
    top:185px;
    right:110px;
    width:520px;
    bottom:60px;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:8;
}

.splashPersonaje{
    max-width:100%;
    max-height:100%;
    object-fit:contain;
    filter:drop-shadow(0 0 24px rgba(159,255,212,.45));
}

@media (max-width:768px){
    .fondoPersonaje{
        object-position:center center;
        opacity:.86;
        filter:brightness(.68) contrast(1.12) saturate(.85);
    }

    .titulo{
        top:22px;
        font-size:27px;
        letter-spacing:4px;
        width:90%;
        text-align:center;
    }

    .subtitulo{
        top:68px;
        font-size:10px;
        width:90%;
        letter-spacing:2px;
    }

    .selectorVisual{
        top:88px;
        gap:5px;
        width:90%;
        justify-content:center;
    }

    .selectorVisual button{
        padding:5px 8px;
        font-size:8px;
        border-radius:8px;
        letter-spacing:1px;
    }

    .sonido{
        width:42px;
        height:42px;
        right:13px;
        top:13px;
        font-size:20px;
    }

    .zonaCentral{
        top:105px;
        left:5px;
        right:5px;
        width:auto;
        bottom:165px;
        align-items:center;
    }

    .splashPersonaje{
        max-width:96%;
        max-height:100%;
    }

    .menuLateral{
        left:8px;
        top:auto;
        bottom:8px;
        transform:none;
        width:46%;
        gap:4px;
    }

    .botonNingen{
        width:100%;
        padding:8px;
        font-size:14px;
        border-radius:10px;
        letter-spacing:3px;
    }

    .botonFicha{
        width:100%;
        padding:6px;
        font-size:8.5px;
        border-radius:9px;
        letter-spacing:1px;
        background:rgba(0,0,0,.35);
        border:1px solid rgba(255,255,255,.32);
        box-shadow:none;
    }

    .panelInfo{
        left:auto;
        top:auto;
        right:8px;
        bottom:8px;
        width:46%;
        min-height:160px;
        max-height:260px;
        overflow-y:auto;
        padding:11px;
        border-radius:12px;
        background:rgba(0,0,0,.34);
    }

    .panelInfo h2{
        font-size:11px;
        letter-spacing:1px;
        margin-bottom:7px;
    }

    .panelInfo p{
        font-size:9px;
        line-height:1.35;
    }
}
</style>
</head>

<body>

<img class="fondoPersonaje" src="Logo Ben.png" alt="Fondo Ben One For Pubi">

<audio id="audioFondo" loop>
    <source src="Soundtrack Ben.mp3" type="audio/mpeg">
</audio>

<div class="capaOscura"></div>

<button class="sonido" id="botonSonido" onclick="toggleSonido()">🔇</button>

<div class="titulo">ONE FOR PUBI</div>
<div class="subtitulo">Archivo NINGEN // El Niño del Oso</div>

<div class="selectorVisual">
    <button onclick="mostrarVisual('splash')">SPLASH ART</button>
    <button onclick="mostrarVisual('carta')">CARTA</button>
    <button onclick="mostrarVisual('boceto')">BOCETO</button>
</div>

<div class="panelInfo">
    <h2 id="tituloInfo">ARCHIVO</h2>
    <p id="textoInfo">Selecciona una categoría para desplegar información de One For Pubi.</p>
</div>

<div class="zonaCentral">
    <img id="imagenPrincipal" class="splashPersonaje" src="Splash Art One For Pubi.png" alt="One For Pubi">
</div>

<div class="menuLateral">
    <button class="botonNingen" onclick="window.location.href='index.html'">NINGEN</button>

    <button class="botonFicha" onclick="mostrarInfo('IDENTIDAD')">IDENTIDAD</button>
    <button class="botonFicha" onclick="mostrarInfo('ORIGEN')">ORIGEN</button>
    <button class="botonFicha" onclick="mostrarInfo('DESCRIPCIÓN')">DESCRIPCIÓN</button>
    <button class="botonFicha" onclick="mostrarInfo('PERSONALIDAD')">PERSONALIDAD</button>
    <button class="botonFicha" onclick="mostrarInfo('HISTORIA')">HISTORIA</button>
    <button class="botonFicha" onclick="mostrarInfo('HABILIDADES')">HABILIDADES</button>
    <button class="botonFicha" onclick="mostrarInfo('FRAGMENTOS')">FRAGMENTOS</button>
    <button class="botonFicha" onclick="mostrarInfo('RELACIONES')">RELACIONES</button>
    <button class="botonFicha" onclick="mostrarInfo('REGISTROS')">REGISTROS</button>
    <button class="botonFicha" onclick="mostrarInfo('CLASIFICACIÓN')">CLASIFICACIÓN</button>
</div>

<script>
function toggleSonido(){
    const audio=document.getElementById("audioFondo");
    const boton=document.getElementById("botonSonido");

    if(audio.paused){
        audio.volume=.55;
        audio.play();
        boton.textContent="🔊";
    }else{
        audio.pause();
        boton.textContent="🔇";
    }
}

function mostrarVisual(tipo){
    const img=document.getElementById("imagenPrincipal");

    if(tipo==="splash"){
        img.src="Splash Art One For Pubi.png";
        img.alt="One For Pubi Splash Art";
    }

    if(tipo==="carta"){
        img.src="Carta One For Pubi.png";
        img.alt="Carta One For Pubi";
    }

    if(tipo==="boceto"){
        img.src="Boceto One For Pubi.png";
        img.alt="Boceto One For Pubi";
    }
}

function mostrarInfo(seccion){
    const titulo=document.getElementById("tituloInfo");
    const texto=document.getElementById("textoInfo");

    const info={
        "IDENTIDAD":`
            <strong>Nombre:</strong> Ben Fürer<br>
            <strong>Alias:</strong> One For Pubi, El Sanador, El Niño del Oso.<br>
            <strong>Raza:</strong> Humano Alterado<br>
            <strong>Sexo:</strong> Masculino<br>
            <strong>Edad aparente:</strong> 12 años<br>
            <strong>Edad real:</strong> 28 años<br>
            <strong>Estado:</strong> Activo<br>
            <strong>Nombre de nacimiento:</strong> Desconocido para él mismo.
        `,

        "ORIGEN":`
            Ben fue encontrado solo por Frank Ford.<br><br>
            Los registros no indican quiénes eran sus padres.<br><br>
            Tampoco indican qué ocurrió con ellos.<br><br>
            Cuando Frank lo encontró ya estaba completamente solo.<br><br>
            Poco después comenzó a formar parte de los experimentos relacionados con fragmentos.
        `,

        "DESCRIPCIÓN":`
            Niño de pequeña estatura y apariencia inofensiva.<br><br>
            Siempre porta un bastón terminado en la figura de un oso de peluche.<br><br>
            Muchos creen que se trata de una simple decoración.<br><br>
            Los registros indican otra cosa.<br><br>
            Para Ben, es un recuerdo.
        `,

        "PERSONALIDAD":`
            Amable.<br><br>
            Gentil.<br><br>
            Compasivo.<br><br>
            A diferencia de otros afectados por los fragmentos, Ben no parece haber sido transformado por ellos.<br><br>
            Los fragmentos simplemente permitieron que el resto viera quién era realmente.
        `,

        "HISTORIA":`
            Durante años permaneció bajo la custodia de Frank Ford.<br><br>
            No existen registros de intentos de escape.<br><br>
            No existen registros de comportamiento agresivo.<br><br>
            En 2010, el terremoto de Chile alteró el experimento.<br><br>
            Fragmentos de Fisura quedaron expuestos.<br><br>
            La reacción cambió a todos los involucrados.<br><br>
            Ben sobrevivió.<br><br>
            Su oso de peluche no.<br><br>
            Años después reconstruyó cada pieza con sus propias manos.<br><br>
            Cuando terminó, lo convirtió en la cabeza de su bastón.
        `,

        "HABILIDADES":`
            <strong>Sanación:</strong> restaura heridas físicas de otros seres vivos.<br><br>
            <strong>Purificación:</strong> reduce efectos negativos relacionados con fragmentos alterados.<br><br>
            <strong>Transferencia Vital:</strong> puede entregar parte de su propia energía para salvar a otros.<br><br>
            <strong>Empatía Anómala:</strong> percibe sufrimiento físico y emocional con facilidad.<br><br>
            <strong>Milagro Menor:</strong> sucesos improbables parecen ocurrir cerca de él cuando alguien necesita ayuda.<br><br>
            Los registros coinciden en algo:<br><br>
            Ben puede sanar a otros mucho mejor de lo que puede sanarse a sí mismo.
        `,

        "FRAGMENTOS":`
            <strong>Fragmento asociado:</strong> Vida.<br><br>
            Los registros consideran a Ben uno de los casos más extraños conocidos.<br><br>
            El fragmento no alteró su personalidad.<br><br>
            Simplemente amplificó aquello que ya existía dentro de él.<br><br>
            Su poder está orientado a preservar la vida, no a destruirla.
        `,

        "RELACIONES":`
            <strong>Frank Ford:</strong> responsable de los experimentos que alteraron su vida.<br><br>
            <strong>El Ogro:</strong> víctima del mismo incidente ocurrido en 2010.<br><br>
            <strong>Ray Fürer:</strong> identidad biológica desconocida para ambos.<br><br>
            <strong>Isaac Salvatore:</strong> uno de los pocos individuos que sospecha que existe algo extraño en el origen de Ben.
        `,

        "REGISTROS":`
            <strong>Registro 501:</strong> El Niño del Laboratorio.<br><br>
            <strong>Registro 502:</strong> El Oso Roto.<br><br>
            <strong>Registro 503:</strong> El Sanador.<br><br>
            <strong>Registro 504:</strong> Identidad Biológica. Archivo restringido.
        `,

        "CLASIFICACIÓN":`
            <strong>Tipo:</strong> Humano Alterado<br>
            <strong>Nivel de amenaza:</strong> ⭐⭐⭐⭐<br>
            <strong>Importancia histórica:</strong> 8/10<br>
            <strong>Nivel de conocimiento:</strong> Restringido<br>
            <strong>Estado:</strong> Activo<br>
            <strong>Riesgo para la humanidad:</strong> Bajo<br>
            <strong>Clasificación Ningen:</strong> Portador de Vida
        `
    };

    titulo.textContent=seccion;
    texto.innerHTML=info[seccion];
}
</script>

</body>
</html>
