<body>

<video id="videoFondo" autoplay muted loop playsinline>
    <source src="grok_video_2026-03-10-13-42-53.mp4" type="video/mp4">
</video>

<div class="capaOscura"></div>

<button class="sonido" id="botonSonido" onclick="toggleSonido()">🔇</button>

<div class="titulo">CAMILLE</div>
<div class="subtitulo">Archivo NINGEN // La Tejedora de Salem</div>

<div class="panelInfo">
    <h2 id="tituloInfo">ARCHIVO</h2>
    <p id="textoInfo">Selecciona una categoría para desplegar información de Camille.</p>
</div>

<div class="zonaCentral">
    <img class="splashPersonaje" src="Splash Art La Tejedora.png" alt="Camille La Tejedora">
</div>

<div class="menuLateral">

    <button class="botonNingen" onclick="window.location.href='index.html'">NINGEN</button>

    <button class="botonFicha" onclick="mostrarInfo('IDENTIDAD')">IDENTIDAD</button>
    <button class="botonFicha" onclick="mostrarInfo('ORIGEN')">ORIGEN</button>
    <button class="botonFicha" onclick="mostrarInfo('DESCRIPCIÓN')">DESCRIPCIÓN</button>
    <button class="botonFicha" onclick="mostrarInfo('PERSONALIDAD')">PERSONALIDAD</button>
    <button class="botonFicha" onclick="mostrarInfo('HISTORIA')">HISTORIA</button>

    <button class="botonFicha" onclick="mostrarInfo('REGISTROS')">REGISTROS</button>
    <button class="botonFicha" onclick="mostrarInfo('CLASIFICACIÓN')">CLASIFICACIÓN</button>

</div>

<script>
function toggleSonido(){
    const video=document.getElementById("videoFondo");
    const boton=document.getElementById("botonSonido");

    video.muted = !video.muted;

    if(video.muted){
        boton.textContent="🔇";
    }else{
        video.play();
        boton.textContent="🔊";
    }
}

function mostrarInfo(seccion){
    const titulo=document.getElementById("tituloInfo");
    const texto=document.getElementById("textoInfo");

    const info={
        "IDENTIDAD":`
            <strong>Nombre:</strong> Camille<br>
            <strong>Alias:</strong> La Tejedora, La Mujer de Salem, La Caminante del Fuego, Aquella que Sobrevivió a las Llamas.<br>
            <strong>Raza:</strong> Tejedora<br>
            <strong>Sexo:</strong> Femenino<br>
            <strong>Edad aparente:</strong> 30 años<br>
            <strong>Edad real:</strong> Desconocida<br>
            <strong>Estado:</strong> Activa<br>
            <strong>Primera aparición conocida:</strong> Salem, Massachusetts, 1692.
        `,

        "ORIGEN":`
            La verdadera procedencia de Camille es desconocida.<br><br>
            Su existencia se vuelve detectable durante los Juicios de Salem, en 1692.<br><br>
            Existe un único testimonio no verificado de una persona que creyó haber visto a una mujer atravesar las llamas durante una ejecución.<br><br>
            Según su relato, el fuego parecía apartarse a medida que ella avanzaba.<br><br>
            Sin embargo, el propio testigo reconoció no estar seguro de lo que había visto debido al humo, el caos y la distancia.<br><br>
            El testimonio fue descartado y nunca pudo ser corroborado.
        `,

        "DESCRIPCIÓN":`
            Mujer de apariencia joven, cabello oscuro y largo, piel extremadamente pálida y ojos grises.<br><br>
            Su presencia suele pasar desapercibida incluso cuando se encuentra rodeada de personas.<br><br>
            Muchos testigos afirman recordar haberla visto, pero son incapaces de describir su rostro con precisión.
        `,

        "PERSONALIDAD":`
            Camille es reservada, observadora y profundamente paciente.<br><br>
            Prefiere escuchar antes que hablar. Evita intervenir directamente en los acontecimientos y rara vez muestra emociones intensas.<br><br>
            Posee una profunda empatía por la humanidad, aunque mantiene distancia emocional debido a la cantidad de siglos que ha vivido.
        `,

        "HISTORIA":`
            Durante los Juicios de Salem, Camille estableció contacto con Giles Corey y Martha Corey.<br><br>
            Por razones desconocidas, Giles llegó a conocer una parte de la verdad que ella protegía.<br><br>
            Cuando ambos fueron acusados, la situación escapó de cualquier posibilidad de control. Martha fue ejecutada. Giles fue sometido a tortura.<br><br>
            A pesar de tener múltiples oportunidades para revelar lo que sabía, decidió guardar silencio.<br><br>
            <strong>"Más peso."</strong><br><br>
            Hasta el día de hoy se desconoce qué secreto decidió proteger.<br><br>
            Camille sobrevivió. Ellos no.
        `,

        "HABILIDADES":`
            <strong>Tejido de Destinos:</strong> puede alterar probabilidades futuras mediante los Hilos.<br><br>
            <strong>Lectura de Hilos:</strong> percibe conexiones invisibles entre personas, lugares y acontecimientos.<br><br>
            <strong>Longevidad:</strong> su envejecimiento parece haberse detenido hace siglos.<br><br>
            <strong>Memoria Perfecta:</strong> recuerda con exactitud acontecimientos ocurridos cientos de años atrás.<br><br>
            <strong>Presencia Difusa:</strong> las personas tienen dificultades para recordar detalles específicos sobre ella.
        `,

        "FRAGMENTOS":`
            <strong>Fragmento asociado:</strong> Fragmento de Vida.<br><br>
            A diferencia de otros portadores, Camille no parece utilizar su fragmento de manera ofensiva.<br><br>
            Las investigaciones sugieren que el Fragmento de Vida es responsable de su extraordinaria longevidad y de la aparente detención de su envejecimiento.<br><br>
            Su conexión con este fragmento es considerada una de las más antiguas registradas.<br><br>
            La verdadera extensión de sus capacidades continúa siendo desconocida.
        `,

        "RELACIONES":`
            <strong>Giles Corey:</strong> uno de los pocos humanos que conoció parte de la verdad. Protegió dicho conocimiento incluso bajo tortura. Fallecido.<br><br>
            <strong>Martha Corey:</strong> víctima de los Juicios de Salem. Su ejecución marcó profundamente a Camille. Fallecida.<br><br>
            <strong>Las Tejedoras:</strong> su relación con otras Tejedoras es desconocida. Algunos registros sugieren que Camille podría ser una de las más antiguas de su especie.
        `,

        "REGISTROS":`
            <strong>Registro 017:</strong> La Mujer de las Llamas. Primer avistamiento no confirmado durante los Juicios de Salem.<br><br>
            <strong>Registro 143:</strong> El Silencio de Giles. Documento que vincula a Camille con Giles Corey.<br><br>
            <strong>Registro 301:</strong> Aquella que No Envejece. Compilación de apariciones idénticas registradas entre los siglos XVII y XXI.
        `,

        "CLASIFICACIÓN":`
            <strong>Tipo:</strong> Tejedora<br>
            <strong>Nivel de amenaza:</strong> ⭐⭐⭐⭐⭐⭐⭐⭐⭐⭐<br>
            <strong>Importancia histórica:</strong> 8/10<br>
            <strong>Nivel de conocimiento:</strong> Prohibido<br>
            <strong>Estado:</strong> Vigilancia pasiva<br>
            <strong>Riesgo para la humanidad:</strong> Bajo<br>
            <strong>Clasificación Ningen:</strong> Entidad Antigua
        `
    };

    titulo.textContent=seccion;
    texto.innerHTML=info[seccion];
}
</script>
