<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GUILLERMO TELL | NINGEN</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
    font-family:Segoe UI, sans-serif;
    background:black;
    color:white;
    overflow:hidden;
}

.fondoPersonaje{
    position:fixed;
    inset:0;
    width:100vw;
    height:100vh;
    object-fit:cover;
    object-position:56% 38%;
    opacity:.9;
    z-index:-2;
    filter:brightness(.78) contrast(1.12);
}


.capaOscura{
    position:fixed;
    inset:0;
    background:
        radial-gradient(circle at center, rgba(0,0,0,.08), rgba(0,0,0,.72) 78%),
        rgba(0,0,0,.22);
    z-index:-1;
}


.sonido{
    position:fixed;
    right:30px;
    top:30px;
    width:58px;
    height:58px;
    border-radius:50%;
    border:2px solid white;
    background:rgba(0,0,0,.55);
    color:white;
    font-size:28px;
    cursor:pointer;
    z-index:40;
    box-shadow:0 0 12px white;
}

.titulo{
    position:fixed;
    top:35px;
    left:50%;
    transform:translateX(-50%);
    font-size:55px;
    letter-spacing:10px;
    text-shadow:0 0 12px #ffd27a,0 0 35px #8a5200;
    z-index:5;
}

.subtitulo{
    position:fixed;
    top:110px;
    left:50%;
    transform:translateX(-50%);
    font-size:16px;
    letter-spacing:4px;
    color:#ffe0a3;
    text-align:center;
    z-index:5;
}

.selectorVisual{
    position:fixed;
    top:145px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:12px;
    z-index:30;
}

.selectorVisual button{
    padding:10px 22px;
    border-radius:14px;
    border:1px solid rgba(255,255,255,.42);
    background:rgba(0,0,0,.45);
    color:#ffe0a3;
    font-weight:bold;
    letter-spacing:2px;
    cursor:pointer;
    box-shadow:0 0 10px rgba(255,194,92,.25);
}

.selectorVisual button:hover{
    box-shadow:0 0 18px rgba(255,194,92,.65);
}

.menuLateral{
    position:fixed;
    left:25px;
    top:50%;
    transform:translateY(-50%);
    display:flex;
    flex-direction:column;
    gap:12px;
    z-index:30;
}

.botonNingen{
    width:240px;
    padding:18px;
    border-radius:18px;
    border:1px solid rgba(255,255,255,.65);
    color:white;
    font-size:24px;
    font-weight:bold;
    letter-spacing:4px;
    cursor:pointer;
    background:linear-gradient(90deg,#c00000,#5c0000);
    box-shadow:0 0 8px rgba(255,255,255,.25),0 0 18px rgba(255,0,0,.35);
    transition:.3s;
}

.botonFicha{
    width:240px;
    padding:15px;
    border-radius:16px;
    border:1px solid rgba(255,255,255,.42);
    color:white;
    font-size:15px;
    font-weight:bold;
    letter-spacing:2px;
    cursor:pointer;
    background:linear-gradient(135deg,#2b1a05,#a66a13,#120900);
    box-shadow:0 0 8px rgba(255,255,255,.12),0 0 12px rgba(255,194,92,.28);
    transition:.3s;
}

.botonNingen:hover{transform:scale(1.04)}

.botonFicha:hover{
    transform:translateX(6px);
    box-shadow:0 0 12px rgba(255,255,255,.25),0 0 18px rgba(255,194,92,.55);
}

.panelInfo{
    position:fixed;
    left:330px;
    top:210px;
    width:470px;
    min-height:330px;
    max-height:62vh;
    overflow-y:auto;
    padding:28px;
    border-radius:20px;
    border:1px solid rgba(255,255,255,.22);
    background:rgba(0,0,0,.42);
    backdrop-filter:blur(5px);
    z-index:20;
}

.panelInfo h2{
    font-size:25px;
    letter-spacing:4px;
    color:#ffe0a3;
    margin-bottom:18px;
}

.panelInfo p{
    font-size:16px;
    line-height:1.65;
    color:rgba(255,255,255,.84);
}

.zonaCentral{
    position:fixed;
    top:185px;
    right:110px;
    width:520px;
    bottom:60px;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:8;
}

.splashPersonaje{
    max-width:100%;
    max-height:100%;
    object-fit:contain;
    filter:drop-shadow(0 0 24px rgba(255,194,92,.45));
}

@media (max-width:768px){
    .titulo{
        top:22px;
        font-size:27px;
        letter-spacing:4px;
        width:90%;
        text-align:center;
    }

    .subtitulo{
        top:68px;
        font-size:10px;
        width:90%;
        letter-spacing:2px;
    }

    .selectorVisual{
        top:88px;
        gap:5px;
        width:90%;
        justify-content:center;
    }

    .selectorVisual button{
        padding:5px 8px;
        font-size:8px;
        border-radius:8px;
        letter-spacing:1px;
    }

    .sonido{
        width:42px;
        height:42px;
        right:13px;
        top:13px;
        font-size:20px;
    }

    .zonaCentral{
        top:105px;
        left:5px;
        right:5px;
        width:auto;
        bottom:165px;
        align-items:center;
    }

    .splashPersonaje{
        max-width:96%;
        max-height:100%;
    }

    .menuLateral{
        left:8px;
        top:auto;
        bottom:8px;
        transform:none;
        width:46%;
        gap:4px;
    }

    .botonNingen{
        width:100%;
        padding:8px;
        font-size:14px;
        border-radius:10px;
        letter-spacing:3px;
    }

    .botonFicha{
        width:100%;
        padding:6px;
        font-size:8.5px;
        border-radius:9px;
        letter-spacing:1px;
        background:transparent;
        border:1px solid rgba(255,255,255,.32);
        box-shadow:none;
    }

    .panelInfo{
        left:auto;
        top:auto;
        right:8px;
        bottom:8px;
        width:46%;
        min-height:160px;
        max-height:260px;
        overflow-y:auto;
        padding:11px;
        border-radius:12px;
        background:rgba(0,0,0,.28);
    }

    .panelInfo h2{
        font-size:11px;
        letter-spacing:1px;
        margin-bottom:7px;
    }

    .panelInfo p{
        font-size:9px;
        line-height:1.35;
    }
}
</style>
</head>

<body>

<img class="fondoPersonaje" src="Logo Guillermo Tell.png" alt="Fondo Guillermo Tell">

<audio id="audioFondo" loop>
    <source src="Soundtrack Arquero.mp3" type="audio/mpeg">
</audio>

<div class="capaOscura"></div>

<button class="sonido" id="botonSonido" onclick="toggleSonido()">🔇</button>

<div class="titulo">GUILLERMO TELL</div>
<div class="subtitulo">Archivo NINGEN // El Arquero del Alcance Imposible</div>

<div class="selectorVisual">
    <button onclick="mostrarVisual('splash')">SPLASH ART</button>
    <button onclick="mostrarVisual('carta')">CARTA</button>
    <button onclick="mostrarVisual('boceto')">BOCETO</button>
</div>

<div class="panelInfo">
    <h2 id="tituloInfo">ARCHIVO</h2>
    <p id="textoInfo">Selecciona una categoría para desplegar información de Guillermo Tell.</p>
</div>

<div class="zonaCentral">
    <img id="imagenPrincipal" class="splashPersonaje" src="Splash Art El Arquero.png" alt="Guillermo Tell El Arquero">
</div>

<div class="menuLateral">
    <button class="botonNingen" onclick="window.location.href='index.html'">NINGEN</button>

    <button class="botonFicha" onclick="mostrarInfo('IDENTIDAD')">IDENTIDAD</button>
    <button class="botonFicha" onclick="mostrarInfo('ORIGEN')">ORIGEN</button>
    <button class="botonFicha" onclick="mostrarInfo('DESCRIPCIÓN')">DESCRIPCIÓN</button>
    <button class="botonFicha" onclick="mostrarInfo('PERSONALIDAD')">PERSONALIDAD</button>
    <button class="botonFicha" onclick="mostrarInfo('HISTORIA')">HISTORIA</button>
    <button class="botonFicha" onclick="mostrarInfo('HABILIDADES')">HABILIDADES</button>
    <button class="botonFicha" onclick="mostrarInfo('FRAGMENTOS')">FRAGMENTOS</button>
    <button class="botonFicha" onclick="mostrarInfo('RELACIONES')">RELACIONES</button>
    <button class="botonFicha" onclick="mostrarInfo('REGISTROS')">REGISTROS</button>
    <button class="botonFicha" onclick="mostrarInfo('CLASIFICACIÓN')">CLASIFICACIÓN</button>
</div>

<script>
function toggleSonido(){
    const video=document.getElementById("videoFondo");
    const boton=document.getElementById("botonSonido");

    video.muted = !video.muted;

    if(video.muted){
        boton.textContent="🔇";
    }else{
        video.play();
        boton.textContent="🔊";
    }
}

function mostrarVisual(tipo){
    const img=document.getElementById("imagenPrincipal");

    if(tipo==="splash"){
        img.src="Splash Art El Arquero.png";
        img.alt="Guillermo Tell El Arquero";
    }

    if(tipo==="carta"){
        img.src="Carta El Arquero.png";
        img.alt="Carta Guillermo Tell";
    }

    if(tipo==="boceto"){
        img.src="Boceto El Arquero.png";
        img.alt="Boceto Guillermo Tell";
    }
}

function mostrarInfo(seccion){
    const titulo=document.getElementById("tituloInfo");
    const texto=document.getElementById("textoInfo");

    const info={
        "IDENTIDAD":`
            <strong>Nombre:</strong> Guillermo Tell<br>
            <strong>Alias:</strong> El Arquero, El Alcance Imposible, El Héroe de las Dos Flechas.<br>
            <strong>Raza:</strong> Humano<br>
            <strong>Sexo:</strong> Masculino<br>
            <strong>Edad al fallecer:</strong> 34 años<br>
            <strong>Estado:</strong> Fallecido<br>
            <strong>Primera aparición conocida:</strong> Registro de los Hermanos Tell.
        `,

        "ORIGEN":`
            La historia oficial relata que Guillermo Tell fue obligado a disparar una flecha contra una manzana colocada sobre la cabeza de un niño.<br><br>
            Durante siglos se creyó que aquel niño era su hijo.<br><br>
            Sin embargo, los Registros Ningen revelan que la historia estaba equivocada.<br><br>
            La persona bajo la manzana era en realidad su hermano menor, William Tell.<br><br>
            Además, William se encontraba vendado y jamás supo todo lo ocurrido aquel día.
        `,

        "DESCRIPCIÓN":`
            Hombre de complexión atlética, cabello oscuro y ojos claros.<br><br>
            Siempre portaba un arco largo de madera oscura.<br><br>
            Era conocido por mantener una postura relajada incluso en situaciones extremas.<br><br>
            Diversos registros afirman que rara vez falló un disparo.
        `,

        "PERSONALIDAD":`
            Guillermo era valiente, impulsivo y profundamente protector.<br><br>
            A diferencia de William, prefería actuar antes que reflexionar demasiado.<br><br>
            Poseía una fuerte convicción moral y estaba dispuesto a enfrentarse a figuras de autoridad cuando consideraba que estaban equivocadas.<br><br>
            Su mayor virtud era su lealtad. Su mayor defecto, creer que proteger a alguien era suficiente, incluso sin explicarle la verdad.
        `,

        "HISTORIA":`
            Guillermo y William fueron entrenados por un maestro conocido únicamente como El Profesor.<br><br>
            Mientras William perfeccionó la disciplina y el combate cuerpo a cuerpo, Guillermo desarrolló habilidades excepcionales con el arco.<br><br>
            Durante un incidente que posteriormente se convertiría en leyenda, fue obligado a disparar una flecha sobre la cabeza de su hermano.<br><br>
            Guillermo logró acertar.<br><br>
            Lo que casi nadie sabía era que llevaba una segunda flecha oculta.<br><br>
            Cuando le preguntaron por qué, respondió:<br><br>
            <strong>"Si la primera hubiera fallado, la segunda habría sido para quien me obligó a hacerlo."</strong><br><br>
            William nunca escuchó esa respuesta.<br><br>
            La tragedia fue que los dos hermanos se amaban, pero ninguno entendió completamente al otro hasta que fue demasiado tarde.
        `,

        "HABILIDADES":`
            <strong>Maestría con Arco:</strong> capacidad de alcanzar objetivos a distancias imposibles.<br><br>
            <strong>Precisión Legendaria:</strong> diversos registros atribuyen a Guillermo disparos considerados imposibles.<br><br>
            <strong>Instinto de Combate:</strong> reaccionaba con rapidez bajo presión extrema.<br><br>
            <strong>Liderazgo Natural:</strong> inspiraba confianza incluso en situaciones desesperadas.<br><br>
            <strong>Voluntad Protectora:</strong> su fuerza aumentaba cuando alguien cercano estaba en peligro.
        `,

        "FRAGMENTOS":`
            <strong>Fragmento asociado:</strong> Fragmento de Alcance.<br><br>
            Este fragmento no aumentaba su fuerza ni su velocidad.<br><br>
            Le permitía alcanzar aquello que otros consideraban imposible.<br><br>
            Para Guillermo, la distancia no era solo una medida física. También era una barrera emocional, moral y espiritual.<br><br>
            Muchos registros consideran que fue uno de los usuarios más compatibles con el Fragmento de Alcance.
        `,

        "RELACIONES":`
            <strong>William Tell:</strong> hermano menor de Guillermo. Fue la persona bajo la manzana durante el incidente que dio origen a la leyenda.<br><br>
            Guillermo intentó protegerlo durante gran parte de su vida, pero nunca logró explicarle completamente lo que había ocurrido aquel día.<br><br>
            <strong>El Profesor:</strong> maestro de ambos hermanos. Fue quien formó sus caminos opuestos: el arco y el cuerpo, la distancia y la cercanía.
        `,

        "REGISTROS":`
            <strong>Registro 041:</strong> La Flecha y la Manzana. Versión oficial conocida por la humanidad.<br><br>
            <strong>Registro 042:</strong> La Segunda Flecha. Documento restringido que revela la existencia de una flecha oculta.<br><br>
            <strong>Registro 043:</strong> Los Hermanos Tell. Compilación de documentos que describen la relación entre Guillermo y William.
        `,

        "CLASIFICACIÓN":`
            <strong>Tipo:</strong> Humano<br>
            <strong>Nivel de amenaza:</strong> ⭐⭐⭐⭐⭐⭐⭐<br>
            <strong>Importancia histórica:</strong> 9/10<br>
            <strong>Nivel de conocimiento:</strong> Restringido<br>
            <strong>Estado:</strong> Fallecido<br>
            <strong>Riesgo para la humanidad:</strong> Bajo<br>
            <strong>Clasificación Ningen:</strong> Héroe Caído
        `
    };

    titulo.textContent=seccion;
    texto.innerHTML=info[seccion];
}
</script>

</body>
</html>
