<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LICAN RAY | NINGEN</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
    font-family:Segoe UI, sans-serif;
    background:black;
    color:white;
    overflow:hidden;
}

#videoFondo{
    position:fixed;
    inset:0;
    width:100vw;
    height:100vh;
    object-fit:cover;
    z-index:-2;
}

.capaOscura{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.62);
    z-index:-1;
}

.sonido{
    position:fixed;
    right:30px;
    top:30px;
    width:58px;
    height:58px;
    border-radius:50%;
    border:2px solid white;
    background:rgba(0,0,0,.55);
    color:white;
    font-size:28px;
    cursor:pointer;
    z-index:40;
    box-shadow:0 0 12px white;
}

.titulo{
    position:fixed;
    top:35px;
    left:50%;
    transform:translateX(-50%);
    font-size:55px;
    letter-spacing:10px;
    text-shadow:0 0 12px #b9c9ff,0 0 35px #24396f;
    z-index:5;
}

.subtitulo{
    position:fixed;
    top:110px;
    left:50%;
    transform:translateX(-50%);
    font-size:16px;
    letter-spacing:4px;
    color:#d9e1ff;
    text-align:center;
    z-index:5;
}

.selectorVisual{
    position:fixed;
    top:145px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:12px;
    z-index:30;
}

.selectorVisual button{
    padding:10px 22px;
    border-radius:14px;
    border:1px solid rgba(255,255,255,.42);
    background:rgba(0,0,0,.45);
    color:#d9e1ff;
    font-weight:bold;
    letter-spacing:2px;
    cursor:pointer;
    box-shadow:0 0 10px rgba(185,201,255,.25);
}

.selectorVisual button:hover{
    box-shadow:0 0 18px rgba(185,201,255,.65);
}

.menuLateral{
    position:fixed;
    left:25px;
    top:50%;
    transform:translateY(-50%);
    display:flex;
    flex-direction:column;
    gap:12px;
    z-index:30;
}

.botonNingen{
    width:240px;
    padding:18px;
    border-radius:18px;
    border:1px solid rgba(255,255,255,.65);
    color:white;
    font-size:24px;
    font-weight:bold;
    letter-spacing:4px;
    cursor:pointer;
    background:linear-gradient(90deg,#c00000,#5c0000);
    box-shadow:0 0 8px rgba(255,255,255,.25),0 0 18px rgba(255,0,0,.35);
    transition:.3s;
}

.botonFicha{
    width:240px;
    padding:15px;
    border-radius:16px;
    border:1px solid rgba(255,255,255,.42);
    color:white;
    font-size:15px;
    font-weight:bold;
    letter-spacing:2px;
    cursor:pointer;
    background:linear-gradient(135deg,#050814,#24396f,#02030a);
    box-shadow:0 0 8px rgba(255,255,255,.12),0 0 12px rgba(185,201,255,.28);
    transition:.3s;
}

.botonNingen:hover{transform:scale(1.04)}

.botonFicha:hover{
    transform:translateX(6px);
    box-shadow:0 0 12px rgba(255,255,255,.25),0 0 18px rgba(185,201,255,.55);
}

.panelInfo{
    position:fixed;
    left:330px;
    top:210px;
    width:470px;
    min-height:330px;
    max-height:62vh;
    overflow-y:auto;
    padding:28px;
    border-radius:20px;
    border:1px solid rgba(255,255,255,.22);
    background:rgba(0,0,0,.42);
    backdrop-filter:blur(5px);
    z-index:20;
}

.panelInfo h2{
    font-size:25px;
    letter-spacing:4px;
    color:#d9e1ff;
    margin-bottom:18px;
}

.panelInfo p{
    font-size:16px;
    line-height:1.65;
    color:rgba(255,255,255,.84);
}

.zonaCentral{
    position:fixed;
    top:185px;
    right:110px;
    width:520px;
    bottom:60px;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:8;
}

.splashPersonaje{
    max-width:100%;
    max-height:100%;
    object-fit:contain;
    filter:drop-shadow(0 0 24px rgba(185,201,255,.45));
}

@media (max-width:768px){
    .titulo{
        top:22px;
        font-size:27px;
        letter-spacing:4px;
        width:90%;
        text-align:center;
    }

    .subtitulo{
        top:68px;
        font-size:10px;
        width:90%;
        letter-spacing:2px;
    }

    .selectorVisual{
        top:88px;
        gap:5px;
        width:90%;
        justify-content:center;
    }

    .selectorVisual button{
        padding:5px 8px;
        font-size:8px;
        border-radius:8px;
        letter-spacing:1px;
    }

    .sonido{
        width:42px;
        height:42px;
        right:13px;
        top:13px;
        font-size:20px;
    }

    .zonaCentral{
        top:105px;
        left:5px;
        right:5px;
        width:auto;
        bottom:165px;
        align-items:center;
    }

    .splashPersonaje{
        max-width:96%;
        max-height:100%;
    }

    .menuLateral{
        left:8px;
        top:auto;
        bottom:8px;
        transform:none;
        width:46%;
        gap:4px;
    }

    .botonNingen{
        width:100%;
        padding:8px;
        font-size:14px;
        border-radius:10px;
        letter-spacing:3px;
    }

    .botonFicha{
        width:100%;
        padding:6px;
        font-size:8.5px;
        border-radius:9px;
        letter-spacing:1px;
        background:transparent;
        border:1px solid rgba(255,255,255,.32);
        box-shadow:none;
    }

    .panelInfo{
        left:auto;
        top:auto;
        right:8px;
        bottom:8px;
        width:46%;
        min-height:160px;
        max-height:260px;
        overflow-y:auto;
        padding:11px;
        border-radius:12px;
        background:rgba(0,0,0,.28);
    }

    .panelInfo h2{
        font-size:11px;
        letter-spacing:1px;
        margin-bottom:7px;
    }

    .panelInfo p{
        font-size:9px;
        line-height:1.35;
    }
}
</style>
</head>

<body>

<video id="videoFondo" autoplay muted loop playsinline>
    <source src="grok_video_2026-03-10-13-42-53.mp4" type="video/mp4">
</video>

<div class="capaOscura"></div>

<button class="sonido" id="botonSonido" onclick="toggleSonido()">🔇</button>

<div class="titulo">LICANRAY</div>
<div class="subtitulo">Archivo NINGEN // Ray Fürer</div>

<div class="selectorVisual">
    <button onclick="mostrarVisual('splash')">SPLASH ART</button>
    <button onclick="mostrarVisual('carta')">CARTA</button>
    <button onclick="mostrarVisual('boceto')">BOCETO</button>
</div>

<div class="panelInfo">
    <h2 id="tituloInfo">ARCHIVO</h2>
    <p id="textoInfo">Selecciona una categoría para desplegar información de Ray Fürer.</p>
</div>

<div class="zonaCentral">
    <img id="imagenPrincipal" class="splashPersonaje" src="Splash Art Lican Ray.png" alt="Ray Fürer Licanray">
</div>

<div class="menuLateral">
    <button class="botonNingen" onclick="window.location.href='index.html'">NINGEN</button>

    <button class="botonFicha" onclick="mostrarInfo('IDENTIDAD')">IDENTIDAD</button>
    <button class="botonFicha" onclick="mostrarInfo('ORIGEN')">ORIGEN</button>
    <button class="botonFicha" onclick="mostrarInfo('DESCRIPCIÓN')">DESCRIPCIÓN</button>
    <button class="botonFicha" onclick="mostrarInfo('PERSONALIDAD')">PERSONALIDAD</button>
    <button class="botonFicha" onclick="mostrarInfo('HISTORIA')">HISTORIA</button>
    <button class="botonFicha" onclick="mostrarInfo('HABILIDADES')">HABILIDADES</button>
    <button class="botonFicha" onclick="mostrarInfo('FRAGMENTOS')">FRAGMENTOS</button>
    <button class="botonFicha" onclick="mostrarInfo('RELACIONES')">RELACIONES</button>
    <button class="botonFicha" onclick="mostrarInfo('REGISTROS')">REGISTROS</button>
    <button class="botonFicha" onclick="mostrarInfo('CLASIFICACIÓN')">CLASIFICACIÓN</button>
</div>

<script>
function toggleSonido(){
    const video=document.getElementById("videoFondo");
    const boton=document.getElementById("botonSonido");

    video.muted = !video.muted;

    if(video.muted){
        boton.textContent="🔇";
    }else{
        video.play();
        boton.textContent="🔊";
    }
}

function mostrarVisual(tipo){
    const img=document.getElementById("imagenPrincipal");

    if(tipo==="splash"){
        img.src="Splash Art Lican Ray.png";
        img.alt="Ray Fürer Licanray";
    }

    if(tipo==="carta"){
        img.src="Carta Lican Ray.png";
        img.alt="Carta Licanray";
    }

    if(tipo==="boceto"){
        img.src="Boceto Lican Ray.png";
        img.alt="Boceto Licanray";
    }
}

function mostrarInfo(seccion){
    const titulo=document.getElementById("tituloInfo");
    const texto=document.getElementById("textoInfo");

    const info={
        "IDENTIDAD":`
            <strong>Nombre:</strong> Ray Fürer<br>
            <strong>Alias:</strong> Licanray, El Guardián Lunar, El Errante, El Hombre de la Luna.<br>
            <strong>Raza:</strong> Humano Alterado<br>
            <strong>Sexo:</strong> Masculino<br>
            <strong>Edad aparente:</strong> 50 años<br>
            <strong>Edad real:</strong> cercano a los 1000 años<br>
            <strong>Estado:</strong> Activo<br>
            <strong>Ubicación de origen:</strong> Región vinculada al Pacífico y las Marianas.
        `,

        "ORIGEN":`
            Ray Fürer entró en contacto con el Fragmento de Desplazamiento hace casi mil años.<br><br>
            Aquel fragmento no era diferente en esencia, pero sí arrastraba una resonancia particular: antes de caer a la Tierra, algunos meteoritos habían pasado cerca de la Luna.<br><br>
            Esa cercanía no creó un nuevo fragmento, pero dejó una marca energética en algunos restos.<br><br>
            Ray fue el único individuo conocido capaz de sincronizarse con uno de ellos.<br><br>
            La unión le otorgó velocidad, longevidad y una conexión irreversible con los ciclos lunares.
        `,

        "DESCRIPCIÓN":`
            Ray posee una presencia imponente, marcada por armadura, pelaje, rasgos bestiales y una mirada difícil de sostener.<br><br>
            Su casco fue fabricado con el cráneo de una criatura ancestral que alguna vez azotó al pueblo que luego llevaría su nombre.<br><br>
            Su espada fue forjada con huesos puros de esa misma bestia.<br><br>
            Muchos lo juzgaron por su apariencia antes de comprender que la verdadera bestia era otra.
        `,

        "PERSONALIDAD":`
            Ray es reservado, noble y profundamente protector.<br><br>
            Ha vivido siglos siendo confundido con aquello que cazaba.<br><br>
            No suele explicar sus acciones ni pedir confianza. Prefiere actuar, incluso si nadie entiende sus razones.<br><br>
            Su mayor carga no es la transformación, sino haber sido visto como monstruo durante demasiado tiempo.
        `,

        "HISTORIA":`
            Durante generaciones, Ray fue perseguido por pueblos que no comprendían su condición.<br><br>
            En una región aislada comenzaron a ocurrir desapariciones. Los habitantes lo culparon de inmediato.<br><br>
            Pero Ray sabía que había algo peor acechando entre ellos.<br><br>
            Durante años rastreó a la criatura responsable hasta enfrentarla y derrotarla.<br><br>
            Cuando el pueblo descubrió la verdad, decidió nombrarse en honor a él.<br><br>
            La historia oficial diría otra cosa. Los Registros Ningen conservan el nombre real: Licanray nació de Ray.
        `,

        "HABILIDADES":`
            <strong>Desplazamiento Extremo:</strong> velocidad, reacción y movimiento superiores a cualquier humano común.<br><br>
            <strong>Transformación Lunar:</strong> su cuerpo entra en resonancia con ciertos ciclos lunares.<br><br>
            <strong>Sentidos Bestiales:</strong> olfato, oído, vista e instinto de caza altamente desarrollados.<br><br>
            <strong>Longevidad Alterada:</strong> envejece aproximadamente veinte veces más lento que un humano normal.<br><br>
            <strong>Cacería Prolongada:</strong> puede rastrear objetivos durante años sin abandonar su propósito.
        `,

        "FRAGMENTOS":`
            <strong>Fragmento asociado:</strong> Desplazamiento.<br><br>
            Ray no porta un fragmento distinto ni una variante lunar.<br><br>
            Su fragmento es de Desplazamiento, pero fue marcado por una antigua resonancia lunar durante la caída de los meteoritos.<br><br>
            La Luna no lo controla. Solo despierta aquello que el fragmento recuerda.<br><br>
            Esta condición explica su velocidad, su longevidad y sus transformaciones.
        `,

        "RELACIONES":`
            <strong>Ben:</strong> hijo biológico de Ray. Las circunstancias de su separación permanecen incompletas en los registros.<br><br>
            <strong>La Bestia del Pueblo:</strong> criatura ancestral que Ray derrotó. Sus restos dieron origen a su casco y espada.<br><br>
            <strong>Habitantes de Licanray:</strong> primero lo juzgaron como monstruo; luego nombraron el pueblo en su honor.
        `,

        "REGISTROS":`
            <strong>Registro 611:</strong> El Monstruo del Pueblo. Primeras acusaciones contra Ray Fürer.<br><br>
            <strong>Registro 612:</strong> La Cacería. Archivo sobre la búsqueda de la criatura responsable de las desapariciones.<br><br>
            <strong>Registro 613:</strong> La Última Luna. Relato de la batalla contra la bestia ancestral.<br><br>
            <strong>Registro 614:</strong> El Nombre del Pueblo. Documento que contradice el origen oficial del nombre Licanray.
        `,

        "CLASIFICACIÓN":`
            <strong>Tipo:</strong> Humano Alterado<br>
            <strong>Nivel de amenaza:</strong> ⭐⭐⭐⭐⭐⭐⭐⭐⭐<br>
            <strong>Importancia histórica:</strong> 9/10<br>
            <strong>Nivel de conocimiento:</strong> Restringido<br>
            <strong>Estado:</strong> Activo<br>
            <strong>Riesgo para la humanidad:</strong> Moderado<br>
            <strong>Clasificación Ningen:</strong> Portador Antiguo
        `
    };

    titulo.textContent=seccion;
    texto.innerHTML=info[seccion];
}
</script>

</body>
</html>
