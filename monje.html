<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WILLIAM TELL | NINGEN</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
    font-family:Segoe UI, sans-serif;
    background:black;
    color:white;
    overflow:hidden;
}

#videoFondo{
    position:fixed;
    inset:0;
    width:100vw;
    height:100vh;
    object-fit:cover;
    z-index:-2;
}

.capaOscura{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.62);
    z-index:-1;
}

.sonido{
    position:fixed;
    right:30px;
    top:30px;
    width:58px;
    height:58px;
    border-radius:50%;
    border:2px solid white;
    background:rgba(0,0,0,.55);
    color:white;
    font-size:28px;
    cursor:pointer;
    z-index:40;
    box-shadow:0 0 12px white;
}

.titulo{
    position:fixed;
    top:35px;
    left:50%;
    transform:translateX(-50%);
    font-size:55px;
    letter-spacing:10px;
    text-shadow:0 0 12px #9fd6ff,0 0 35px #0b3f6f;
    z-index:5;
}

.subtitulo{
    position:fixed;
    top:110px;
    left:50%;
    transform:translateX(-50%);
    font-size:16px;
    letter-spacing:4px;
    color:#c9ecff;
    text-align:center;
    z-index:5;
}

.menuLateral{
    position:fixed;
    left:25px;
    top:50%;
    transform:translateY(-50%);
    display:flex;
    flex-direction:column;
    gap:12px;
    z-index:30;
}

.botonNingen{
    width:240px;
    padding:18px;
    border-radius:18px;
    border:1px solid rgba(255,255,255,.65);
    color:white;
    font-size:24px;
    font-weight:bold;
    letter-spacing:4px;
    cursor:pointer;
    background:linear-gradient(90deg,#c00000,#5c0000);
    box-shadow:0 0 8px rgba(255,255,255,.25),0 0 18px rgba(255,0,0,.35);
    transition:.3s;
}

.botonFicha{
    width:240px;
    padding:15px;
    border-radius:16px;
    border:1px solid rgba(255,255,255,.42);
    color:white;
    font-size:15px;
    font-weight:bold;
    letter-spacing:2px;
    cursor:pointer;
    background:linear-gradient(135deg,#061520,#14577a,#02070b);
    box-shadow:0 0 8px rgba(255,255,255,.12),0 0 12px rgba(159,214,255,.28);
    transition:.3s;
}

.botonNingen:hover{transform:scale(1.04)}

.botonFicha:hover{
    transform:translateX(6px);
    box-shadow:0 0 12px rgba(255,255,255,.25),0 0 18px rgba(159,214,255,.55);
}

.panelInfo{
    position:fixed;
    left:330px;
    top:210px;
    width:470px;
    min-height:330px;
    max-height:62vh;
    overflow-y:auto;
    padding:28px;
    border-radius:20px;
    border:1px solid rgba(255,255,255,.22);
    background:rgba(0,0,0,.42);
    backdrop-filter:blur(5px);
    z-index:20;
}

.panelInfo h2{
    font-size:25px;
    letter-spacing:4px;
    color:#c9ecff;
    margin-bottom:18px;
}

.panelInfo p{
    font-size:16px;
    line-height:1.65;
    color:rgba(255,255,255,.84);
}

.zonaCentral{
    position:fixed;
    top:185px;
    right:110px;
    width:520px;
    bottom:60px;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:8;
}

.splashPersonaje{
    max-width:100%;
    max-height:100%;
    object-fit:contain;
    filter:drop-shadow(0 0 24px rgba(159,214,255,.45));
}

@media (max-width:768px){
    .titulo{
        top:22px;
        font-size:27px;
        letter-spacing:4px;
        width:90%;
        text-align:center;
    }

    .subtitulo{
        top:68px;
        font-size:10px;
        width:90%;
        letter-spacing:2px;
    }

    .sonido{
        width:42px;
        height:42px;
        right:13px;
        top:13px;
        font-size:20px;
    }

    .zonaCentral{
        top:105px;
        left:5px;
        right:5px;
        width:auto;
        bottom:165px;
        align-items:center;
    }

    .splashPersonaje{
        max-width:96%;
        max-height:100%;
    }

    .menuLateral{
        left:8px;
        top:auto;
        bottom:8px;
        transform:none;
        width:46%;
        gap:4px;
    }

    .botonNingen{
        width:100%;
        padding:8px;
        font-size:14px;
        border-radius:10px;
        letter-spacing:3px;
    }

    .botonFicha{
        width:100%;
        padding:6px;
        font-size:8.5px;
        border-radius:9px;
        letter-spacing:1px;
        background:transparent;
        border:1px solid rgba(255,255,255,.32);
        box-shadow:none;
    }

    .panelInfo{
        left:auto;
        top:auto;
        right:8px;
        bottom:8px;
        width:46%;
        min-height:160px;
        max-height:260px;
        overflow-y:auto;
        padding:11px;
        border-radius:12px;
        background:rgba(0,0,0,.28);
    }

    .panelInfo h2{
        font-size:11px;
        letter-spacing:1px;
        margin-bottom:7px;
    }

    .panelInfo p{
        font-size:9px;
        line-height:1.35;
    }
}
</style>
</head>

<body>

<video id="videoFondo" autoplay muted loop playsinline>
    <source src="grok_video_2026-03-10-13-42-53.mp4" type="video/mp4">
</video>

<div class="capaOscura"></div>

<button class="sonido" id="botonSonido" onclick="toggleSonido()">🔇</button>

<div class="titulo">WILLIAM TELL</div>
<div class="subtitulo">Archivo NINGEN // El Monje del Silencio Interior</div>

<div class="panelInfo">
    <h2 id="tituloInfo">ARCHIVO</h2>
    <p id="textoInfo">Selecciona una categoría para desplegar información de William Tell.</p>
</div>

<div class="zonaCentral">
    <img class="splashPersonaje" src="Splash Art El Monje.png" alt="William Tell El Monje">
</div>

<div class="menuLateral">
    <button class="botonNingen" onclick="window.location.href='index.html'">NINGEN</button>

    <button class="botonFicha" onclick="mostrarInfo('IDENTIDAD')">IDENTIDAD</button>
    <button class="botonFicha" onclick="mostrarInfo('ORIGEN')">ORIGEN</button>
    <button class="botonFicha" onclick="mostrarInfo('DESCRIPCIÓN')">DESCRIPCIÓN</button>
    <button class="botonFicha" onclick="mostrarInfo('PERSONALIDAD')">PERSONALIDAD</button>
    <button class="botonFicha" onclick="mostrarInfo('HISTORIA')">HISTORIA</button>
    <button class="botonFicha" onclick="mostrarInfo('HABILIDADES')">HABILIDADES</button>
    <button class="botonFicha" onclick="mostrarInfo('FRAGMENTOS')">FRAGMENTOS</button>
    <button class="botonFicha" onclick="mostrarInfo('RELACIONES')">RELACIONES</button>
    <button class="botonFicha" onclick="mostrarInfo('REGISTROS')">REGISTROS</button>
    <button class="botonFicha" onclick="mostrarInfo('CLASIFICACIÓN')">CLASIFICACIÓN</button>
</div>

<script>
function toggleSonido(){
    const video=document.getElementById("videoFondo");
    const boton=document.getElementById("botonSonido");

    video.muted = !video.muted;

    if(video.muted){
        boton.textContent="🔇";
    }else{
        video.play();
        boton.textContent="🔊";
    }
}

function mostrarInfo(seccion){
    const titulo=document.getElementById("tituloInfo");
    const texto=document.getElementById("textoInfo");

    const info={
        "IDENTIDAD":`
            <strong>Nombre:</strong> William Tell<br>
            <strong>Alias:</strong> El Monje, El Bastón Silencioso, El Hermano Vendado.<br>
            <strong>Raza:</strong> Humano<br>
            <strong>Sexo:</strong> Masculino<br>
            <strong>Edad:</strong> Desconocida<br>
            <strong>Estado:</strong> Activo<br>
            <strong>Arma principal:</strong> Bastón de combate<br>
            <strong>Primera aparición conocida:</strong> Registro de los Hermanos Tell.
        `,

        "ORIGEN":`
            William Tell fue recordado durante siglos como una figura secundaria dentro de la leyenda de Guillermo Tell.<br><br>
            La historia oficial decía que bajo la manzana había un niño. Los Registros Ningen revelan otra verdad: era William, el hermano menor de Guillermo.<br><br>
            Aquel día, William estaba vendado. No vio la flecha. No vio la expresión de su hermano. No vio la segunda flecha oculta.<br><br>
            Sobrevivió al disparo, pero algo dentro de él quedó detenido para siempre.
        `,

        "DESCRIPCIÓN":`
            Hombre de apariencia serena, postura recta y movimientos controlados.<br><br>
            Viste ropas simples, generalmente oscuras o gastadas por el viaje.<br><br>
            Porta un bastón largo, aparentemente común, aunque los registros indican que con él puede enfrentar armas mucho más peligrosas.<br><br>
            Su mirada transmite calma, pero no paz.
        `,

        "PERSONALIDAD":`
            William es disciplinado, silencioso y extremadamente observador.<br><br>
            A primera vista parece un hombre en completo control de sí mismo, pero su serenidad oculta una herida antigua.<br><br>
            No fue corrompido por odio inmediato. Fue consumido lentamente por una pregunta que nunca pudo responder.<br><br>
            Su mayor virtud es la disciplina. Su mayor peligro es que puede confundir silencio con paz.
        `,

        "HISTORIA":`
            William fue entrenado por Isaac Salvatore, el maestro conocido como El Profesor.<br><br>
            Mientras Guillermo perfeccionó el arco y el alcance, William dedicó su vida al combate cuerpo a cuerpo y al dominio del bastón.<br><br>
            Tras el incidente de la manzana, la humanidad celebró a Guillermo como héroe. William, en cambio, quedó convertido en una sombra dentro de la misma historia.<br><br>
            Nunca supo que su hermano había tomado una segunda flecha. Nunca supo que, si el disparo fallaba, Guillermo estaba dispuesto a matar al hombre que los obligó.<br><br>
            Con los años, William buscó paz en la disciplina. Pero cuanto más miraba hacia dentro, más encontraba la misma herida.<br><br>
            La tragedia fue que los dos hermanos se amaban, pero el silencio los separó antes que la muerte.
        `,

        "HABILIDADES":`
            <strong>Combate con Bastón:</strong> dominio absoluto del combate cuerpo a cuerpo utilizando un solo bastón.<br><br>
            <strong>Disciplina Corporal:</strong> control extremo de respiración, postura, equilibrio y resistencia.<br><br>
            <strong>Lectura de Movimiento:</strong> capacidad de anticipar ataques observando mínimos cambios en el cuerpo del rival.<br><br>
            <strong>Defensa Circular:</strong> técnica que convierte el bastón en una barrera móvil alrededor de su cuerpo.<br><br>
            <strong>Silencio Interior:</strong> habilidad para reducir miedo, dolor y distracciones durante el combate.
        `,

        "FRAGMENTOS":`
            <strong>Fragmento asociado:</strong> No confirmado.<br><br>
            Algunos registros sugieren que William entró en contacto con un fragmento vinculado a la Fisura.<br><br>
            Este fragmento no habría creado su oscuridad, sino que habría encontrado una grieta que ya existía dentro de él.<br><br>
            La teoría principal indica que William no buscaba poder. Buscaba una respuesta.<br><br>
            Y algunas respuestas, dentro del universo Ningen, tienen un precio.
        `,

        "RELACIONES":`
            <strong>Guillermo Tell:</strong> hermano mayor. William sobrevivió gracias a su disparo, pero nunca conoció toda la verdad de aquel día.<br><br>
            <strong>Isaac Salvatore:</strong> maestro de ambos hermanos. Fue quien formó a William en disciplina, combate y control interior.<br><br>
            William rara vez habla de ellos. Cuando lo hace, evita usar títulos. Solo dice: mi hermano y mi maestro.
        `,

        "REGISTROS":`
            <strong>Registro 044:</strong> El Hermano Vendado. Documento que revela la identidad real de quien estuvo bajo la manzana.<br><br>
            <strong>Registro 045:</strong> El Bastón Silencioso. Primer registro de William como combatiente independiente.<br><br>
            <strong>Registro 046:</strong> La Pregunta sin Respuesta. Archivo restringido sobre el deterioro interior de William Tell.
        `,

        "CLASIFICACIÓN":`
            <strong>Tipo:</strong> Humano<br>
            <strong>Nivel de amenaza:</strong> ⭐⭐⭐⭐⭐⭐⭐⭐<br>
            <strong>Importancia histórica:</strong> 8/10<br>
            <strong>Nivel de conocimiento:</strong> Restringido<br>
            <strong>Estado:</strong> Activo<br>
            <strong>Riesgo para la humanidad:</strong> Medio<br>
            <strong>Clasificación Ningen:</strong> Monje Errante
        `
    };

    titulo.textContent=seccion;
    texto.innerHTML=info[seccion];
}
</script>

</body>
</html>
