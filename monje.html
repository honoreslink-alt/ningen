<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EL MONJE | NINGEN</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
    font-family:Segoe UI, sans-serif;
    background:black;
    color:white;
    overflow:hidden;
}

#videoFondo{
    position:fixed;
    inset:0;
    width:100vw;
    height:100vh;
    object-fit:cover;
    z-index:-2;
}

.capaOscura{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.62);
    z-index:-1;
}

.sonido{
    position:fixed;
    right:30px;
    top:30px;
    width:58px;
    height:58px;
    border-radius:50%;
    border:2px solid white;
    background:rgba(0,0,0,.55);
    color:white;
    font-size:28px;
    cursor:pointer;
    z-index:40;
    box-shadow:0 0 12px white;
}

.titulo{
    position:fixed;
    top:35px;
    left:50%;
    transform:translateX(-50%);
    font-size:55px;
    letter-spacing:10px;
    text-shadow:0 0 12px #d8b56d,0 0 35px #7a4a18;
    z-index:5;
}

.subtitulo{
    position:fixed;
    top:110px;
    left:50%;
    transform:translateX(-50%);
    font-size:16px;
    letter-spacing:4px;
    color:#e7d3a0;
    text-align:center;
    z-index:5;
}

.menuLateral{
    position:fixed;
    left:25px;
    top:50%;
    transform:translateY(-50%);
    display:flex;
    flex-direction:column;
    gap:12px;
    z-index:30;
}

.botonNingen{
    width:240px;
    padding:18px;
    border-radius:18px;
    border:1px solid rgba(255,255,255,.65);
    color:white;
    font-size:24px;
    font-weight:bold;
    letter-spacing:4px;
    cursor:pointer;
    background:linear-gradient(90deg,#c00000,#5c0000);
    box-shadow:0 0 8px rgba(255,255,255,.25),0 0 18px rgba(255,0,0,.35);
    transition:.3s;
}

.botonFicha{
    width:240px;
    padding:15px;
    border-radius:16px;
    border:1px solid rgba(255,255,255,.42);
    color:white;
    font-size:15px;
    font-weight:bold;
    letter-spacing:2px;
    cursor:pointer;
    background:linear-gradient(135deg,#3b230d,#b28745,#4d2d0f);
    box-shadow:0 0 8px rgba(255,255,255,.12),0 0 12px rgba(178,135,69,.25);
    transition:.3s;
}

.botonNingen:hover{transform:scale(1.04)}

.botonFicha:hover{
    transform:translateX(6px);
    box-shadow:0 0 12px rgba(255,255,255,.25),0 0 18px rgba(216,181,109,.55);
}

.zonaCentral{
    position:fixed;
    top:165px;
    left:310px;
    right:40px;
    bottom:40px;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:8;
}

.splashMonje{
    max-width:520px;
    max-height:72vh;
    object-fit:contain;
    filter:drop-shadow(0 0 22px rgba(216,181,109,.45));
}

.panelInfo{
    position:fixed;
    right:40px;
    bottom:45px;
    width:360px;
    min-height:150px;
    padding:22px;
    border-radius:18px;
    border:1px solid rgba(255,255,255,.25);
    background:rgba(0,0,0,.42);
    backdrop-filter:blur(5px);
    z-index:20;
}

.panelInfo h2{
    font-size:20px;
    letter-spacing:3px;
    color:#e7d3a0;
    margin-bottom:12px;
}

.panelInfo p{
    font-size:14px;
    line-height:1.5;
    color:rgba(255,255,255,.82);
}

/* CELULAR */
@media (max-width:768px){

    .titulo{
        top:22px;
        font-size:30px;
        letter-spacing:5px;
        width:90%;
        text-align:center;
    }

    .subtitulo{
        top:68px;
        font-size:10px;
        width:90%;
        letter-spacing:2px;
    }

    .sonido{
        width:42px;
        height:42px;
        right:13px;
        top:13px;
        font-size:20px;
    }

    .zonaCentral{
        top:105px;
        left:5px;
        right:5px;
        bottom:165px;
        align-items:center;
    }

    .splashMonje{
        max-width:96%;
        max-height:100%;
    }

    .menuLateral{
        left:8px;
        top:auto;
        bottom:8px;
        transform:none;
        width:46%;
        gap:4px;
    }

    .botonNingen{
        width:100%;
        padding:8px;
        font-size:14px;
        border-radius:10px;
        letter-spacing:3px;
    }

    .botonFicha{
        width:100%;
        padding:6px;
        font-size:8.5px;
        border-radius:9px;
        letter-spacing:1px;
        background:transparent;
        border:1px solid rgba(255,255,255,.32);
        box-shadow:none;
    }

    .panelInfo{
        right:8px;
        bottom:8px;
        width:46%;
        min-height:160px;
        padding:11px;
        border-radius:12px;
        background:rgba(0,0,0,.25);
    }

    .panelInfo h2{
        font-size:11px;
        letter-spacing:1px;
        margin-bottom:7px;
    }

    .panelInfo p{
        font-size:9px;
        line-height:1.35;
    }
}
</style>
</head>

<body>

<video id="videoFondo" autoplay muted loop playsinline>
    <source src="grok_video_2026-03-10-13-42-53.mp4" type="video/mp4">
</video>

<div class="capaOscura"></div>

<button class="sonido" id="botonSonido" onclick="toggleSonido()">🔇</button>

<div class="titulo">EL MONJE</div>
<div class="subtitulo">Archivo NINGEN // Registro de entidad</div>

<div class="zonaCentral">
    <img class="splashMonje" src="Splash Art El Monje.png" alt="Splash Art El Monje">
</div>

<div class="menuLateral">

    <button class="botonNingen" onclick="window.location.href='index.html'">NINGEN</button>

    <button class="botonFicha" onclick="mostrarInfo('IDENTIDAD')">IDENTIDAD</button>
    <button class="botonFicha" onclick="mostrarInfo('ORIGEN')">ORIGEN</button>
    <button class="botonFicha" onclick="mostrarInfo('DESCRIPCIÓN')">DESCRIPCIÓN</button>
    <button class="botonFicha" onclick="mostrarInfo('PERSONALIDAD')">PERSONALIDAD</button>
    <button class="botonFicha" onclick="mostrarInfo('HISTORIA')">HISTORIA</button>
    <button class="botonFicha" onclick="mostrarInfo('HABILIDADES')">HABILIDADES</button>
    <button class="botonFicha" onclick="mostrarInfo('FRAGMENTOS')">FRAGMENTOS</button>
    <button class="botonFicha" onclick="mostrarInfo('RELACIONES')">RELACIONES</button>
    <button class="botonFicha" onclick="mostrarInfo('REGISTROS')">REGISTROS</button>
    <button class="botonFicha" onclick="mostrarInfo('CLASIFICACIÓN')">CLASIFICACIÓN</button>

</div>

<div class="panelInfo">
    <h2 id="tituloInfo">ARCHIVO</h2>
    <p id="textoInfo">Selecciona una categoría para desplegar información del Monje.</p>
</div>

<script>
function toggleSonido(){
    const video=document.getElementById("videoFondo");
    const boton=document.getElementById("botonSonido");

    video.muted = !video.muted;

    if(video.muted){
        boton.textContent="🔇";
    }else{
        video.play();
        boton.textContent="🔊";
    }
}

function mostrarInfo(seccion){
    const titulo=document.getElementById("tituloInfo");
    const texto=document.getElementById("textoInfo");

    const info={
        "IDENTIDAD":"Nombre, título, alias, raza, edad, estatura y estado actual de la entidad.",
        "ORIGEN":"Ciudad de origen, región, facción y primeras señales registradas.",
        "DESCRIPCIÓN":"Aspecto físico, vestimenta y rasgos distintivos del Monje.",
        "PERSONALIDAD":"Conducta, forma de hablar, motivaciones y contradicciones internas.",
        "HISTORIA":"Relato principal del personaje dentro del universo Ningen.",
        "HABILIDADES":"Técnicas, dones, límites, debilidades y manifestaciones especiales.",
        "FRAGMENTOS":"Relación del Monje con fragmentos, rastros o energía desconocida.",
        "RELACIONES":"Vínculos con otros personajes, aliados, enemigos o entidades.",
        "REGISTROS":"Avistamientos, documentos, testimonios y archivos vinculados.",
        "CLASIFICACIÓN":"Nivel de amenaza, categoría, estado de observación y prioridad."
    };

    titulo.textContent=seccion;
    texto.textContent=info[seccion];
}
</script>

</body>
</html>
