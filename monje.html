<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EL MONJE | NINGEN</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
    font-family:Segoe UI, sans-serif;
    background:black;
    color:white;
    overflow:hidden;
}

#videoFondo{
    position:fixed;
    inset:0;
    width:100vw;
    height:100vh;
    object-fit:cover;
    z-index:-2;
}

.capaOscura{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.62);
    z-index:-1;
}

.sonido{
    position:fixed;
    right:30px;
    top:30px;
    width:58px;
    height:58px;
    border-radius:50%;
    border:2px solid white;
    background:rgba(0,0,0,.55);
    color:white;
    font-size:28px;
    cursor:pointer;
    z-index:40;
    box-shadow:0 0 12px white;
}

.titulo{
    position:fixed;
    top:45px;
    left:50%;
    transform:translateX(-50%);
    font-size:55px;
    letter-spacing:10px;
    text-shadow:0 0 12px #d8b56d,0 0 35px #7a4a18;
    z-index:5;
}

.subtitulo{
    position:fixed;
    top:120px;
    left:50%;
    transform:translateX(-50%);
    font-size:16px;
    letter-spacing:4px;
    color:#e7d3a0;
    text-align:center;
    z-index:5;
}

.menuLateral{
    position:fixed;
    left:25px;
    top:50%;
    transform:translateY(-50%);
    display:flex;
    flex-direction:column;
    gap:12px;
    z-index:30;
}

.botonNingen{
    width:240px;
    padding:18px;
    border-radius:18px;
    border:1px solid rgba(255,255,255,.65);
    color:white;
    font-size:24px;
    font-weight:bold;
    letter-spacing:4px;
    cursor:pointer;
    background:linear-gradient(90deg,#c00000,#5c0000);
    box-shadow:0 0 8px rgba(255,255,255,.25),0 0 18px rgba(255,0,0,.35);
    transition:.3s;
}

.botonFicha{
    width:240px;
    padding:15px;
    border-radius:16px;
    border:1px solid rgba(255,255,255,.42);
    color:white;
    font-size:15px;
    font-weight:bold;
    letter-spacing:2px;
    cursor:pointer;
    background:linear-gradient(135deg,#3b230d,#b28745,#4d2d0f);
    box-shadow:0 0 8px rgba(255,255,255,.12),0 0 12px rgba(178,135,69,.25);
    transition:.3s;
}

.botonNingen:hover{
    transform:scale(1.04);
}

.botonFicha:hover{
    transform:translateX(6px);
    box-shadow:0 0 12px rgba(255,255,255,.25),0 0 18px rgba(216,181,109,.55);
}

.mensajeCentro{
    position:fixed;
    top:52%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    font-size:28px;
    letter-spacing:4px;
    color:rgba(255,255,255,.78);
    background:rgba(0,0,0,.35);
    border:1px solid rgba(255,255,255,.18);
    border-radius:20px;
    padding:28px 45px;
}

/* CELULAR */
@media (max-width:768px){

    .titulo{
        top:28px;
        font-size:32px;
        letter-spacing:5px;
        width:90%;
        text-align:center;
    }

    .subtitulo{
        top:78px;
        font-size:11px;
        width:90%;
        letter-spacing:2px;
    }

    .sonido{
        width:45px;
        height:45px;
        right:15px;
        top:15px;
        font-size:21px;
    }

    .mensajeCentro{
        top:35%;
        width:78%;
        font-size:15px;
        padding:16px;
        letter-spacing:2px;
    }

    .menuLateral{
        left:12px;
        top:auto;
        bottom:10px;
        transform:none;
        width:155px;
        gap:5px;
    }

    .botonNingen{
        width:155px;
        padding:9px;
        font-size:15px;
        border-radius:12px;
        letter-spacing:3px;
    }

    .botonFicha{
        width:155px;
        padding:7px;
        font-size:9px;
        border-radius:10px;
        letter-spacing:1px;
        background:rgba(0,0,0,.18);
        border:1px solid rgba(255,255,255,.32);
        box-shadow:none;
    }
}
</style>
</head>

<body>

<video id="videoFondo" autoplay muted loop playsinline>
    <source src="grok_video_2026-03-10-13-42-53.mp4" type="video/mp4">
</video>

<div class="capaOscura"></div>

<button class="sonido" id="botonSonido" onclick="toggleSonido()">🔇</button>

<div class="titulo">EL MONJE</div>

<div class="subtitulo">Archivo NINGEN // Registro de entidad</div>

<div class="mensajeCentro">BASE DE ARCHIVO EN CONSTRUCCIÓN</div>

<div class="menuLateral">

    <button class="botonNingen" onclick="window.location.href='index.html'">NINGEN</button>

    <button class="botonFicha">IDENTIDAD</button>
    <button class="botonFicha">ORIGEN</button>
    <button class="botonFicha">DESCRIPCIÓN</button>
    <button class="botonFicha">PERSONALIDAD</button>
    <button class="botonFicha">HISTORIA</button>
    <button class="botonFicha">HABILIDADES</button>
    <button class="botonFicha">FRAGMENTOS</button>
    <button class="botonFicha">RELACIONES</button>
    <button class="botonFicha">REGISTROS</button>
    <button class="botonFicha">CLASIFICACIÓN</button>

</div>

<script>
function toggleSonido(){
    const video=document.getElementById("videoFondo");
    const boton=document.getElementById("botonSonido");

    video.muted = !video.muted;

    if(video.muted){
        boton.textContent="🔇";
    }else{
        video.play();
        boton.textContent="🔊";
    }
}
</script>

</body>
</html>
